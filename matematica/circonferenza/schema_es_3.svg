<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -60 160 130" width="360" height="292">
  <defs>
    <marker id="axe" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#7a6f65"/>
    </marker>
  </defs>

  <rect x="-20" y="-60" width="160" height="130" fill="#ede5d5" rx="4"/>

  <!-- assi -->
  <line x1="-15" y1="0" x2="135" y2="0" stroke="#7a6f65" stroke-width="0.8" marker-end="url(#axe)"/>
  <line x1="0" y1="60" x2="0" y2="-55" stroke="#7a6f65" stroke-width="0.8" marker-end="url(#axe)"/>
  <text x="128" y="-3" font-family="IBM Plex Mono" font-size="7" fill="#7a6f65">x</text>
  <text x="3"   y="-50" font-family="IBM Plex Mono" font-size="7" fill="#7a6f65">y</text>

  <!-- Scale: 1 unit = 12px. Origine in (20, 30) del canvas SVG -->
  <!-- C = (3, -1) → SVG (56, 42); r = 2√5 ≈ 4.47 → 53.7px -->
  <!-- Retta: 2x - y - 9 = 0 → y = 2x - 9 -->
  <!-- Punti sulla retta visibili: x=3→y=-3, x=6→y=3, x=1→y=-7 -->
  <!-- in SVG: x→20+12x, y→30-12y -->

  <!-- circonferenza -->
  <circle cx="56" cy="42" r="53.7" fill="rgba(58,90,122,0.08)" stroke="#1a1612" stroke-width="2"/>

  <!-- retta 2x-y-9=0 → y=2x-9: x=0→y=-9(SVG:138), x=7→y=5(SVG:-30) -->
  <!-- SVG: x=0→20, y=-9→30+108=138; x=7→20+84=104, y=5→30-60=-30 -->
  <line x1="-15" y1="168" x2="104" y2="-30" stroke="#3a6a4a" stroke-width="2" stroke-dasharray="none"/>
  <!-- Retta visibile nel viewport: clip approssimativo -->
  <line x1="20" y1="138" x2="100" y2="-26" stroke="#3a6a4a" stroke-width="2"/>
  <text x="90" y="-28" font-family="IBM Plex Mono" font-size="8" fill="#3a6a4a">2x−y−9=0</text>

  <!-- centro C=(3,-1) → SVG (56, 42) -->
  <circle cx="56" cy="42" r="3" fill="#8b3a2a"/>
  <text x="59" y="39" font-family="IBM Plex Mono" font-size="8" fill="#8b3a2a">C(3,−1)</text>

  <!-- Piede perpendicolare dal centro alla retta.
       Retta: 2x-y-9=0. Direzione normale: (2,-1). 
       Piede: C + t*(2,-1) tale che piede sulla retta.
       t = -(2*3 - 1*(-1) - 9)/(4+1) = -(-2)/5 = 2/5
       Piede = (3 + 4/5, -1 - 2/5) = (3.8, -1.4)
       SVG: (20+12*3.8, 30-12*(-1.4)) = (65.6, 46.8) -->
  <line x1="56" y1="42" x2="65.6" y2="46.8" stroke="#c9a84c" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="57" y="55" font-family="IBM Plex Mono" font-size="8" fill="#b5882a">d</text>
  <!-- quadratino angolo retto -->
  <rect x="63.2" y="44.5" width="4" height="4" fill="none" stroke="#c9a84c" stroke-width="1" transform="rotate(26.57, 65.2, 46.5)"/>

  <!-- segmento corda (parte visibile, approssimativa per lo schema) -->
  <!-- I due punti di intersezione si trovano risolvendo il sistema. 
       Dal calcolo: x=2 → SVG(44, ...) e x=5.6 → SVG(87,...) circa -->
  <line x1="44" y1="24" x2="87" y2="110" stroke="#3a5a7a" stroke-width="3" opacity="0.5"/>
  <text x="28" y="20" font-family="IBM Plex Mono" font-size="8" fill="#3a5a7a">ℓ</text>

  <!-- punti di intersezione (approssimati per lo schema) -->
  <circle cx="44" cy="24" r="3" fill="#3a5a7a" stroke="#1a1612" stroke-width="1"/>
  <circle cx="86" cy="107" r="3" fill="#3a5a7a" stroke="#1a1612" stroke-width="1"/>

  <!-- etichette assi -->
  <text x="32" y="-3" font-family="IBM Plex Mono" font-size="7" fill="#7a6f65">3</text>
  <text x="-3" y="36" font-family="IBM Plex Mono" font-size="7" fill="#7a6f65" text-anchor="end">−1</text>
</svg>
