  <template data-exercise-statement>
    <section class="exercise-text">
      <h2>Esercizio 2 — Retta obliqua e circonferenza — metodo del discriminante</h2>
      <p>
        Data la circonferenza \(\mathcal{C}: x^2+y^2=10\) e la famiglia di rette
        \[
          r_k: y=x+k,
        \]
        determina per quali valori reali del parametro \(k\) la retta è:
      </p>
      <ol type="a">
        <li>secante alla circonferenza;</li>
        <li>tangente alla circonferenza;</li>
        <li>esterna alla circonferenza.</li>
      </ol>
    </section>

    <section class="exercise-data">
      <h3>Dati</h3>
      <ul>
        <li>Circonferenza: \(x^2+y^2=10\)</li>
        <li>Centro: \(C=(0,0)\)</li>
        <li>Raggio: \(R=\sqrt{10}\)</li>
        <li>Famiglia di rette: \(r_k:y=x+k\), con \(k\in\mathbb{R}\)</li>
      </ul>
    </section>

    <section class="exercise-request">
      <h3>Richiesta</h3>
      <p>
        Studiare la posizione reciproca tra \(r_k\) e \(\mathcal{C}\) al variare di \(k\), usando il discriminante dell'equazione risolvente.
      </p>
    </section>

    <section class="exercise-solution">
      <h3>Svolgimento</h3>

      <h4>Idea del metodo</h4>
      <p>
        Intersecare una retta e una circonferenza significa risolvere il sistema formato dalle loro equazioni.
        Sostituendo l'equazione della retta nella circonferenza si ottiene un'equazione di secondo grado.
        Il suo discriminante \(\Delta\) permette di distinguere i tre casi:
      </p>
      <ul>
        <li>\(\Delta&gt;0\): due soluzioni reali distinte, quindi la retta è <strong>secante</strong>;</li>
        <li>\(\Delta=0\): una soluzione reale doppia, quindi la retta è <strong>tangente</strong>;</li>
        <li>\(\Delta&lt;0\): nessuna soluzione reale, quindi la retta è <strong>esterna</strong>.</li>
      </ul>

      <h4>Sostituzione della retta nella circonferenza</h4>
      <p>Sostituiamo \(y=x+k\) nell'equazione \(x^2+y^2=10\):</p>
      \[
        x^2+(x+k)^2=10.
      \]
      <p>Sviluppiamo il quadrato:</p>
      \[
        x^2+x^2+2kx+k^2=10.
      \]
      <p>Portiamo tutto al primo membro:</p>
      \[
        2x^2+2kx+k^2-10=0.
      \]
      <p>Otteniamo quindi un'equazione di secondo grado nella variabile \(x\):</p>
      \[
        2x^2+2kx+(k^2-10)=0.
      \]

      <h4>Calcolo del discriminante</h4>
      <p>
        L'equazione ha forma \(ax^2+bx+c=0\), con:
      </p>
      <ul>
        <li>\(a=2\);</li>
        <li>\(b=2k\);</li>
        <li>\(c=k^2-10\).</li>
      </ul>
      <p>Il discriminante è:</p>
      \[
        \Delta=b^2-4ac.
      \]
      <p>Sostituendo i coefficienti:</p>
      \[
        \Delta=(2k)^2-4\cdot 2\cdot (k^2-10).
      \]
      \[
        \Delta=4k^2-8(k^2-10).
      \]
      \[
        \Delta=4k^2-8k^2+80.
      \]
      \[
        \Delta=80-4k^2=4(20-k^2).
      \]

      <h4>Studio del segno di \(\Delta\)</h4>
      <p>Poiché \(4&gt;0\), il segno di \(\Delta\) coincide con il segno di \(20-k^2\).</p>

      <p><strong>1. Caso secante.</strong> La retta è secante quando \(\Delta&gt;0\):</p>
      \[
        4(20-k^2)&gt;0.
      \]
      \[
        20-k^2&gt;0.
      \]
      \[
        k^2&lt;20.
      \]
      \[
        -\sqrt{20}&lt;k&lt;\sqrt{20}.
      \]
      <p>Poiché \(\sqrt{20}=2\sqrt{5}\), otteniamo:</p>
      \[
        -2\sqrt{5}&lt;k&lt;2\sqrt{5}.
      \]

      <p><strong>2. Caso tangente.</strong> La retta è tangente quando \(\Delta=0\):</p>
      \[
        4(20-k^2)=0.
      \]
      \[
        20-k^2=0.
      \]
      \[
        k^2=20.
      \]
      \[
        k=\pm\sqrt{20}=\pm 2\sqrt{5}.
      \]
      <p>
        Per questi due valori la retta tocca la circonferenza in un solo punto.
        Possiamo trovare anche i punti di tangenza.
      </p>
      <p>Se \(k=2\sqrt{5}\), l'equazione risolvente diventa:</p>
      \[
        2x^2+4\sqrt{5}\,x+10=0.
      \]
      <p>Dividendo per \(2\):</p>
      \[
        x^2+2\sqrt{5}\,x+5=0.
      \]
      <p>Il trinomio è un quadrato perfetto:</p>
      \[
        (x+\sqrt{5})^2=0,
      \]
      quindi
      \[
        x=-\sqrt{5}.
      \]
      <p>Allora:</p>
      \[
        y=x+k=-\sqrt{5}+2\sqrt{5}=\sqrt{5}.
      \]
      <p>Il punto di tangenza è \((-\sqrt{5},\sqrt{5})\).</p>

      <p>Se \(k=-2\sqrt{5}\), per simmetria si ottiene il punto di tangenza:</p>
      \[
        (\sqrt{5},-\sqrt{5}).
      \]

      <p><strong>3. Caso esterno.</strong> La retta è esterna quando \(\Delta&lt;0\):</p>
      \[
        4(20-k^2)&lt;0.
      \]
      \[
        20-k^2&lt;0.
      \]
      \[
        k^2&gt;20.
      \]
      quindi
      \[
        k&lt;-2\sqrt{5}\quad \text{oppure}\quad k&gt;2\sqrt{5}.
      \]

      <h4>Controllo geometrico</h4>
      <p>
        La retta \(y=x+k\) si può scrivere in forma implicita come
        \[
          x-y+k=0.
        \]
        La distanza del centro \(C=(0,0)\) da questa retta è
        \[
          d=\frac{|1\cdot 0+(-1)\cdot 0+k|}{\sqrt{1^2+(-1)^2}}
          =\frac{|k|}{\sqrt{2}}.
        \]
        La tangente si ha quando \(d=R\), cioè quando
        \[
          \frac{|k|}{\sqrt{2}}=\sqrt{10}.
        \]
        Moltiplicando per \(\sqrt{2}\):
        \[
          |k|=\sqrt{20}=2\sqrt{5}.
        \]
        Questo conferma i valori trovati con il discriminante.
      </p>

    <section class="exercise-result">
      <h3>Risultato finale</h3>
      <ul>
        <li><strong>Secante</strong> per \(-2\sqrt{5}&lt;k&lt;2\sqrt{5}\).</li>
        <li><strong>Tangente</strong> per \(k=\pm 2\sqrt{5}\).</li>
        <li><strong>Esterna</strong> per \(k&lt;-2\sqrt{5}\) oppure \(k&gt;2\sqrt{5}\).</li>
      </ul>
      <p>
        Nei due casi tangenti i punti di tangenza sono \((-\sqrt{5},\sqrt{5})\) e \((\sqrt{5},-\sqrt{5})\).
      </p>
