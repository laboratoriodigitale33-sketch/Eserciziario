    <section class="exercise-text">
      <h2>Esercizio 2 - Rette oblique e circonferenza centrata nell'origine</h2>
      <p>
        Data la circonferenza \(\mathcal{C}: x^2+y^2=8\), determina la posizione
        reciproca delle tre rette:
      </p>
      <ul>
        <li>\(r_1: y=x+2\)</li>
        <li>\(r_2: y=x+4\)</li>
        <li>\(r_3: y=x+5\)</li>
      </ul>
    </section>

    <section class="exercise-request">
      <h3>Richiesta</h3>
      <p>Usa sempre la sostituzione e il discriminante della quadratica.</p>
    </section>

  <template data-exercise-solution>
    <section class="exercise-solution">
      <h3>Svolgimento</h3>
      <p>Per una retta del tipo \(y=x+k\), sostituiamo nella circonferenza:</p>
      \[
        x^2+(x+k)^2=8.
      \]
      \[
        2x^2+2kx+k^2-8=0.
      \]
      <p>Il discriminante e':</p>
      \[
        \Delta=(2k)^2-4\cdot2\cdot(k^2-8)
        =4k^2-8k^2+64
        =64-4k^2.
      \]

      <h4>Retta \(r_1:y=x+2\)</h4>
      \[
        \Delta=64-4\cdot2^2=64-16=48&gt;0.
      \]
      <p>Quindi \(r_1\) e' <strong>secante</strong>.</p>

      <h4>Retta \(r_2:y=x+4\)</h4>
      \[
        \Delta=64-4\cdot4^2=64-64=0.
      \]
      <p>Quindi \(r_2\) e' <strong>tangente</strong>.</p>

      <h4>Retta \(r_3:y=x+5\)</h4>
      \[
        \Delta=64-4\cdot5^2=64-100=-36&lt;0.
      \]
      <p>Quindi \(r_3\) e' <strong>esterna</strong>.</p>
    </section>

    <section class="exercise-result">
      <h3>Risultato finale</h3>
      <ul>
        <li>\(y=x+2\): secante.</li>
        <li>\(y=x+4\): tangente.</li>
        <li>\(y=x+5\): esterna.</li>
      </ul>
    </section>
