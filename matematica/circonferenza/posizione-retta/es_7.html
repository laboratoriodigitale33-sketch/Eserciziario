    <section class="exercise-text">
      <h2>Esercizio 7 — Riconoscere una retta tangente con il discriminante</h2>
      <p>
        Data la circonferenza
        \[
          \mathcal{C}:x^2+y^2-4x-2y-4=0
        \]
        e la retta
        \[
          r:y=4,
        \]
        stabilisci con il metodo del discriminante se la retta è secante, tangente o esterna. Se è tangente, trova il punto di tangenza.
      </p>
    </section>

    <section class="exercise-data">
      <h3>Dati</h3>
      <ul>
        <li>Circonferenza: \(x^2+y^2-4x-2y-4=0\).</li>
        <li>Retta: \(y=4\).</li>
      </ul>
    </section>

    <section class="exercise-request">
      <h3>Richiesta</h3>
      <p>Usare il discriminante dell'equazione risolvente per classificare la retta e trovare l'eventuale punto di tangenza.</p>
    </section>

  <template data-exercise-solution>
    <section class="exercise-solution">
      <h3>Svolgimento</h3>

      <h4>Passo 1 — Sostituzione della retta</h4>
      <p>Sostituiamo \(y=4\) nell'equazione della circonferenza:</p>
      \[
        x^2+4^2-4x-2\cdot 4-4=0.
      \]
      <p>Semplifichiamo:</p>
      \[
        x^2+16-4x-8-4=0.
      \]
      \[
        x^2-4x+4=0.
      \]

      <h4>Passo 2 — Discriminante</h4>
      <p>L'equazione ha coefficienti \(a=1\), \(b=-4\), \(c=4\). Quindi:</p>
      \[
        \Delta=(-4)^2-4\cdot 1\cdot 4=16-16=0.
      \]
      <p>Poiché \(\Delta=0\), la retta è <strong>tangente</strong>.</p>

      <h4>Passo 3 — Punto di tangenza</h4>
      <p>Risolviamo l'equazione:</p>
      \[
        x^2-4x+4=0 \Rightarrow (x-2)^2=0 \Rightarrow x=2.
      \]
      <p>Poiché la retta è \(y=4\), il punto di tangenza è:</p>
      \[
        T=(2,4).
      \]
    </section>

    <section class="exercise-result">
      <h3>Risultato finale</h3>
      <ul>
        <li>Equazione risolvente: \(x^2-4x+4=0\).</li>
        <li>\(\Delta=0\), quindi la retta è <strong>tangente</strong>.</li>
        <li>Punto di tangenza: \(T=(2,4)\).</li>
      </ul>
    </section>
