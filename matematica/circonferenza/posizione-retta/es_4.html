  <template data-exercise-statement>
    <section class="exercise-text">
      <h2>Esercizio 4 - Circonferenza in forma generale e retta secante</h2>
      <p>
        Data la circonferenza
        \[
          \mathcal{C}: x^2+y^2-4x+6y-3=0
        \]
        e la retta
        \[
          r: 3x+4y+2=0,
        \]
        stabilisci la posizione reciproca usando il metodo del discriminante.
        Se la retta e' secante, determina i punti di intersezione.
      </p>
    </section>

    <section class="exercise-data">
      <h3>Dati</h3>
      <ul>
        <li>Circonferenza: \(x^2+y^2-4x+6y-3=0\)</li>
        <li>Retta: \(3x+4y+2=0\)</li>
      </ul>
    </section>

  <template data-exercise-solution>
    <section class="exercise-solution">
      <h3>Svolgimento con il metodo del discriminante</h3>

      <h4>Passo 1 - Esplicitazione della retta</h4>
      \[
        3x+4y+2=0
      \]
      \[
        4y=-3x-2
      \]
      \[
        y=\frac{-3x-2}{4}.
      \]

      <h4>Passo 2 - Sostituzione nella circonferenza</h4>
      <p>Sostituiamo \(y=\frac{-3x-2}{4}\) in \(x^2+y^2-4x+6y-3=0\):</p>
      \[
        x^2+\left(\frac{-3x-2}{4}\right)^2-4x
        +6\left(\frac{-3x-2}{4}\right)-3=0.
      \]
      <p>Moltiplichiamo per \(16\):</p>
      \[
        16x^2+(9x^2+12x+4)-64x-72x-48-48=0.
      \]
      \[
        25x^2-124x-92=0.
      \]

      <h4>Passo 3 - Discriminante</h4>
      \[
        \Delta=(-124)^2-4\cdot25\cdot(-92)
      \]
      \[
        \Delta=15376+9200=24576.
      \]
      <p>Poiche' \(\Delta&gt;0\), la retta e' <strong>secante</strong>.</p>

      <h4>Passo 4 - Ascisse dei punti di intersezione</h4>
      \[
        x=\frac{124\pm\sqrt{24576}}{50}
        =\frac{124\pm64\sqrt6}{50}
        =\frac{62\pm32\sqrt6}{25}.
      \]

      <h4>Passo 5 - Ordinate dei punti</h4>
      <p>Usiamo \(y=\frac{-3x-2}{4}\).</p>
      \[
        y=\frac{-59\mp24\sqrt6}{25}.
      \]
      <p>Quindi:</p>
      \[
        A\left(\frac{62-32\sqrt6}{25},\,\frac{-59+24\sqrt6}{25}\right)
      \]
      \[
        B\left(\frac{62+32\sqrt6}{25},\,\frac{-59-24\sqrt6}{25}\right).
      \]
    </section>

    <section class="exercise-result">
      <h3>Risultato</h3>
      <ul>
        <li>\(\Delta=24576&gt;0\), quindi la retta e' <strong>secante</strong>.</li>
        <li>\(A\left(\frac{62-32\sqrt6}{25},\frac{-59+24\sqrt6}{25}\right)\)</li>
        <li>\(B\left(\frac{62+32\sqrt6}{25},\frac{-59-24\sqrt6}{25}\right)\)</li>
      </ul>
    </section>
