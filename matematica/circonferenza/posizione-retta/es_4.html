    <section class="exercise-text">
      <h2>Esercizio 4 — Circonferenza in forma generale e retta secante</h2>
      <p>
        Data la circonferenza
        \[
          \mathcal{C}:x^2+y^2-4x+6y-3=0
        \]
        e la retta
        \[
          r:3x+4y+2=0,
        \]
        stabilisci la posizione reciproca usando il metodo del discriminante. Se ci sono intersezioni, determina i punti.
      </p>
    </section>

    <section class="exercise-data">
      <h3>Dati</h3>
      <ul>
        <li>Circonferenza: \(x^2+y^2-4x+6y-3=0\).</li>
        <li>Retta: \(3x+4y+2=0\).</li>
      </ul>
    </section>

    <section class="exercise-request">
      <h3>Richiesta</h3>
      <ol>
        <li>Risolvere il sistema retta-circonferenza.</li>
        <li>Usare il discriminante per classificare la retta.</li>
        <li>Calcolare i punti di intersezione.</li>
      </ol>
    </section>

  <template data-exercise-solution>
    <section class="exercise-solution">
      <h3>Svolgimento</h3>

      <h4>Osservazione preliminare</h4>
      <p>
        Il testo precedente indicava questa situazione come caso tangente, ma con i dati assegnati la retta non è tangente: è secante. Lo si vede in modo diretto dal discriminante positivo.
      </p>

      <h4>Passo 1 — Esplicitazione della retta</h4>
      <p>Dalla retta \(3x+4y+2=0\) ricaviamo:</p>
      \[
        4y=-3x-2 \Rightarrow y=\frac{-3x-2}{4}.
      \]

      <h4>Passo 2 — Sostituzione nella circonferenza</h4>
      <p>Sostituiamo \(y=\frac{-3x-2}{4}\) in \(x^2+y^2-4x+6y-3=0\):</p>
      \[
        x^2+\left(\frac{-3x-2}{4}\right)^2-4x+6\left(\frac{-3x-2}{4}\right)-3=0.
      \]
      <p>Per eliminare i denominatori moltiplichiamo tutto per \(16\):</p>
      \[
        16x^2+(-3x-2)^2-64x+24(-3x-2)-48=0.
      \]
      <p>Sviluppiamo:</p>
      \[
        16x^2+9x^2+12x+4-64x-72x-48-48=0.
      \]
      <p>Raccogliamo i termini simili:</p>
      \[
        25x^2-124x-92=0.
      \]

      <h4>Passo 3 — Discriminante</h4>
      <p>L'equazione ha coefficienti \(a=25\), \(b=-124\), \(c=-92\). Quindi:</p>
      \[
        \Delta=b^2-4ac=(-124)^2-4\cdot 25\cdot(-92).
      \]
      \[
        \Delta=15376+9200=24576.
      \]
      <p>Poiché \(24576&gt;0\), la retta è <strong>secante</strong>.</p>

      <h4>Passo 4 — Coordinate dei punti di intersezione</h4>
      <p>Poiché \(\sqrt{24576}=64\sqrt{6}\), si ha:</p>
      \[
        x=\frac{124\pm 64\sqrt{6}}{50}=\frac{62\pm 32\sqrt{6}}{25}.
      \]
      <p>Ora sostituiamo in \(y=\frac{-3x-2}{4}\):</p>
      \[
        y=\frac{-3\left(\frac{62\pm 32\sqrt{6}}{25}\right)-2}{4}
        =\frac{-186\mp 96\sqrt{6}-50}{100}
        =\frac{-59\mp 24\sqrt{6}}{25}.
      \]
      <p>I due punti sono quindi:</p>
      \[
        A\left(\frac{62-32\sqrt{6}}{25},\frac{-59+24\sqrt{6}}{25}\right),
        \qquad
        B\left(\frac{62+32\sqrt{6}}{25},\frac{-59-24\sqrt{6}}{25}\right).
      \]
    </section>

    <section class="exercise-result">
      <h3>Risultato finale</h3>
      <ul>
        <li>Equazione risolvente: \(25x^2-124x-92=0\).</li>
        <li>\(\Delta=24576&gt;0\), quindi la retta è <strong>secante</strong>.</li>
        <li>Intersezioni: \(A\left(\frac{62-32\sqrt{6}}{25},\frac{-59+24\sqrt{6}}{25}\right)\), \(B\left(\frac{62+32\sqrt{6}}{25},\frac{-59-24\sqrt{6}}{25}\right)\).</li>
      </ul>
    </section>
