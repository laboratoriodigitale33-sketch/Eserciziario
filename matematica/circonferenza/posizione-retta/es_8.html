    <section class="exercise-text">
      <h2>Esercizio 8 — Riconoscere una retta esterna con il discriminante</h2>
      <p>
        Data la circonferenza
        \[
          \mathcal{C}:x^2+y^2-6x+4y+4=0
        \]
        e la retta
        \[
          r:y=x+5,
        \]
        stabilisci con il metodo del discriminante se la retta è secante, tangente o esterna.
      </p>
    </section>

    <section class="exercise-data">
      <h3>Dati</h3>
      <ul>
        <li>Circonferenza: \(x^2+y^2-6x+4y+4=0\).</li>
        <li>Retta: \(y=x+5\).</li>
      </ul>
    </section>

    <section class="exercise-request">
      <h3>Richiesta</h3>
      <p>Risolvere il sistema tramite sostituzione e classificare la retta in base al segno di \(\Delta\).</p>
    </section>

  <template data-exercise-solution>
    <section class="exercise-solution">
      <h3>Svolgimento</h3>

      <h4>Passo 1 — Sostituzione della retta</h4>
      <p>Sostituiamo \(y=x+5\) in \(x^2+y^2-6x+4y+4=0\):</p>
      \[
        x^2+(x+5)^2-6x+4(x+5)+4=0.
      \]
      <p>Sviluppiamo:</p>
      \[
        x^2+x^2+10x+25-6x+4x+20+4=0.
      \]
      <p>Raccogliamo i termini simili:</p>
      \[
        2x^2+8x+49=0.
      \]

      <h4>Passo 2 — Discriminante</h4>
      <p>L'equazione ha coefficienti \(a=2\), \(b=8\), \(c=49\). Quindi:</p>
      \[
        \Delta=8^2-4\cdot 2\cdot 49.
      \]
      \[
        \Delta=64-392=-328.
      \]
      <p>Poiché \(\Delta&lt;0\), l'equazione non ha soluzioni reali. Quindi la retta è <strong>esterna</strong>.</p>
    </section>

    <section class="exercise-result">
      <h3>Risultato finale</h3>
      <ul>
        <li>Equazione risolvente: \(2x^2+8x+49=0\).</li>
        <li>\(\Delta=-328&lt;0\), quindi la retta è <strong>esterna</strong>.</li>
        <li>Non esistono punti reali di intersezione.</li>
      </ul>
    </section>
