      <h2>Esercizio 5 - Circonferenza in forma generale e rette orizzontali</h2>
      <p>
        Data la circonferenza
        \[
          \mathcal{C}: x^2+y^2-2x+4y-4=0,
        \]
        studia la posizione reciproca delle rette:
      </p>
      <ul>
        <li>\(r_1: y=0\)</li>
        <li>\(r_2: y=1\)</li>
        <li>\(r_3: y=3\)</li>
      </ul>
    </section>

  <template data-exercise-solution>
    <section class="exercise-solution">
      <h3>Svolgimento con il discriminante</h3>

      <h4>Retta \(r_1:y=0\)</h4>
      <p>Sostituiamo \(y=0\):</p>
      \[
        x^2+0^2-2x+4\cdot0-4=0
      \]
      \[
        x^2-2x-4=0.
      \]
      \[
        \Delta=(-2)^2-4\cdot1\cdot(-4)=4+16=20&gt;0.
      \]
      <p>Quindi \(r_1\) e' <strong>secante</strong>.</p>

      <h4>Retta \(r_2:y=1\)</h4>
      \[
        x^2+1-2x+4-4=0
      \]
      \[
        x^2-2x+1=0.
      \]
      \[
        \Delta=(-2)^2-4\cdot1\cdot1=4-4=0.
      \]
      <p>Quindi \(r_2\) e' <strong>tangente</strong>.</p>
      \[
        x=\frac{2}{2}=1.
      \]
      <p>Il punto di tangenza e' \((1,1)\).</p>

      <h4>Retta \(r_3:y=3\)</h4>
      \[
        x^2+9-2x+12-4=0
      \]
      \[
        x^2-2x+17=0.
      \]
      \[
        \Delta=(-2)^2-4\cdot1\cdot17=4-68=-64&lt;0.
      \]
      <p>Quindi \(r_3\) e' <strong>esterna</strong>.</p>
    </section>

    <section class="exercise-result">
      <h3>Risultato finale</h3>
      <ul>
        <li>\(y=0\): secante.</li>
        <li>\(y=1\): tangente nel punto \((1,1)\).</li>
        <li>\(y=3\): esterna.</li>
      </ul>
    </section>
