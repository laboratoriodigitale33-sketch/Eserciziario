    <section class="exercise-text">
      <h2>Esercizio 1 - Retta orizzontale e circonferenza centrata nell'origine</h2>
      <p>
        Data la circonferenza \(\mathcal{C}: x^2 + y^2 = 25\) e le rette
        \(r_1: y = 3\), \(r_2: y = 5\), \(r_3: y = 7\), determina la posizione
        reciproca di ciascuna retta rispetto alla circonferenza.
      </p>
    </section>

    <section class="exercise-data">
      <h3>Dati</h3>
      <ul>
        <li>Circonferenza: \(x^2+y^2=25\)</li>
        <li>Rette: \(y=3\), \(y=5\), \(y=7\)</li>
      </ul>
    </section>

    <section class="exercise-request">
      <h3>Richiesta</h3>
      <p>
        Usa il metodo del discriminante: sostituisci l'equazione della retta
        nella circonferenza e studia il valore di \(\Delta\).
      </p>
    </section>

  <template data-exercise-solution>
    <section class="exercise-solution">
      <h3>Svolgimento con il metodo del discriminante</h3>

      <h4>Criterio algebrico</h4>
      <p>
        Sostituiamo la retta nella circonferenza. Otteniamo un'equazione di secondo
        grado. Allora:
      </p>
      <ul>
        <li>se \(\Delta &gt; 0\), la retta e' <strong>secante</strong>;</li>
        <li>se \(\Delta = 0\), la retta e' <strong>tangente</strong>;</li>
        <li>se \(\Delta &lt; 0\), la retta e' <strong>esterna</strong>.</li>
      </ul>

      <h4>Retta \(r_1: y=3\)</h4>
      <p>Sostituiamo \(y=3\) in \(x^2+y^2=25\):</p>
      \[
        x^2+3^2=25 \quad \Rightarrow \quad x^2-16=0.
      \]
      <p>Questa e' una quadratica in \(x\), con \(a=1\), \(b=0\), \(c=-16\).</p>
      \[
        \Delta=b^2-4ac=0^2-4\cdot 1\cdot(-16)=64&gt;0.
      \]
      <p>La retta \(r_1\) e' quindi <strong>secante</strong>.</p>
      \[
        x=\frac{0\pm\sqrt{64}}{2}=\pm4.
      \]
      <p>I punti di intersezione sono \((-4,3)\) e \((4,3)\).</p>

      <h4>Retta \(r_2: y=5\)</h4>
      \[
        x^2+5^2=25 \quad \Rightarrow \quad x^2=0.
      \]
      <p>Qui \(a=1\), \(b=0\), \(c=0\), quindi:</p>
      \[
        \Delta=0^2-4\cdot1\cdot0=0.
      \]
      <p>La retta \(r_2\) e' <strong>tangente</strong>.</p>
      \[
        x=0.
      \]
      <p>Il punto di tangenza e' \((0,5)\).</p>

      <h4>Retta \(r_3: y=7\)</h4>
      \[
        x^2+7^2=25 \quad \Rightarrow \quad x^2+24=0.
      \]
      <p>Qui \(a=1\), \(b=0\), \(c=24\), quindi:</p>
      \[
        \Delta=0^2-4\cdot1\cdot24=-96&lt;0.
      \]
      <p>La retta \(r_3\) e' <strong>esterna</strong>, perche' non ci sono soluzioni reali.</p>
    </section>

    <section class="exercise-result">
      <h3>Risultato finale</h3>
      <ul>
        <li>\(r_1:y=3\) e' secante: \((-4,3)\), \((4,3)\).</li>
        <li>\(r_2:y=5\) e' tangente: punto \((0,5)\).</li>
        <li>\(r_3:y=7\) e' esterna: nessuna intersezione reale.</li>
      </ul>
    </section>
