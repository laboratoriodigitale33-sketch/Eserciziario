  <template data-exercise-statement>
    <section class="exercise-text">
      <h2>Esercizio 1 — Retta orizzontale e circonferenza centrata nell'origine</h2>
      <p>
        Data la circonferenza \(\mathcal{C}: x^2 + y^2 = 25\) e le rette:
      </p>
      <ul>
        <li>\(r_1: y = 3\)</li>
        <li>\(r_2: y = 5\)</li>
        <li>\(r_3: y = 7\)</li>
      </ul>
      <p>Determina la posizione reciproca di ciascuna retta rispetto alla circonferenza.</p>
    </section>

    <section class="exercise-data">
      <h3>Dati</h3>
      <ul>
        <li>Circonferenza: \(x^2 + y^2 = 25\)</li>
        <li>Centro: \(C=(0,0)\)</li>
        <li>Raggio: \(R=5\)</li>
        <li>Rette: \(r_1:y=3\), \(r_2:y=5\), \(r_3:y=7\)</li>
      </ul>
    </section>

    <section class="exercise-request">
      <h3>Richiesta</h3>
      <p>
        Classificare ciascuna retta come <em>secante</em>, <em>tangente</em> o <em>esterna</em> alla circonferenza.
      </p>
    </section>
  </template>

      <h3>Svolgimento</h3>

      <h4>Metodo scelto</h4>
      <p>
        Usiamo prima un criterio geometrico molto rapido. Per una circonferenza di centro \(C\) e raggio \(R\), una retta è:
      </p>
      <ul>
        <li><strong>secante</strong> se la distanza \(d\) del centro dalla retta soddisfa \(d&lt;R\);</li>
        <li><strong>tangente</strong> se \(d=R\);</li>
        <li><strong>esterna</strong> se \(d&gt;R\).</li>
      </ul>
      <p>
        In questo esercizio le rette hanno forma \(y=k\). La distanza del centro \(C=(0,0)\) dalla retta orizzontale \(y=k\) è semplicemente
        \[
          d=|k|.
        \]
      </p>

      <h4>Studio della retta \(r_1:y=3\)</h4>
      <p>Per \(r_1\) si ha \(k=3\), quindi:</p>
      \[
        d_1=|3|=3.
      \]
      <p>Poiché \(3&lt;5\), la retta \(r_1\) è <strong>secante</strong>.</p>
      <p>Possiamo verificarlo anche algebricamente sostituendo \(y=3\) nell'equazione della circonferenza:</p>
      \[
        x^2+3^2=25
      \]
      \[
        x^2+9=25
      \]
      \[
        x^2=16
      \]
      \[
        x=\pm 4.
      \]
      <p>Dunque i punti di intersezione sono \((-4,3)\) e \((4,3)\). La presenza di due punti conferma che la retta è secante.</p>

      <h4>Studio della retta \(r_2:y=5\)</h4>
      <p>Per \(r_2\) si ha \(k=5\), quindi:</p>
      \[
        d_2=|5|=5.
      \]
      <p>Poiché \(d_2=R\), la retta \(r_2\) è <strong>tangente</strong>.</p>
      <p>Verifica algebrica:</p>
      \[
        x^2+5^2=25
      \]
      \[
        x^2+25=25
      \]
      \[
        x^2=0
      \]
      \[
        x=0.
      \]
      <p>Il punto di tangenza è quindi \((0,5)\). La soluzione doppia indica che la retta tocca la circonferenza in un solo punto.</p>

      <h4>Studio della retta \(r_3:y=7\)</h4>
      <p>Per \(r_3\) si ha \(k=7\), quindi:</p>
      \[
        d_3=|7|=7.
      \]
      <p>Poiché \(7&gt;5\), la retta \(r_3\) è <strong>esterna</strong>.</p>
      <p>La verifica algebrica dà infatti:</p>
      \[
        x^2+7^2=25
      \]
      \[
        x^2+49=25
      \]
      \[
        x^2=-24.
      \]
      <p>Non esistono soluzioni reali, quindi non ci sono punti di intersezione.</p>

    <section class="exercise-result">
      <h3>Risultato finale</h3>
      <ul>
        <li>\(r_1:y=3\) è <strong>secante</strong>; punti di intersezione: \((-4,3)\), \((4,3)\).</li>
        <li>\(r_2:y=5\) è <strong>tangente</strong>; punto di tangenza: \((0,5)\).</li>
        <li>\(r_3:y=7\) è <strong>esterna</strong>; non ha intersezioni reali con la circonferenza.</li>
      </ul>
