    <section class="exercise-text">
      <h2>Esercizio 1 — Metodo del discriminante con rette orizzontali</h2>
      <p>
        Data la circonferenza \(\mathcal{C}: x^2+y^2=25\) e le rette
        \[
          r_1:y=3,\qquad r_2:y=5,\qquad r_3:y=7,
        \]
        stabilisci, usando il metodo del discriminante, se ciascuna retta è secante, tangente o esterna alla circonferenza.
      </p>
    </section>

    <section class="exercise-data">
      <h3>Dati</h3>
      <ul>
        <li>Circonferenza: \(x^2+y^2=25\).</li>
        <li>Rette: \(r_1:y=3\), \(r_2:y=5\), \(r_3:y=7\).</li>
      </ul>
    </section>

    <section class="exercise-request">
      <h3>Richiesta</h3>
      <p>
        Per ciascuna retta, risolvere il sistema retta-circonferenza tramite sostituzione e studiare il segno del discriminante \(\Delta\).
      </p>
    </section>

  <template data-exercise-solution>
    <section class="exercise-solution">
      <h3>Svolgimento</h3>

      <h4>Richiamo teorico essenziale</h4>
      <p>
        Per studiare l'intersezione tra una retta e una circonferenza risolviamo il sistema tra le due equazioni.
        Dopo la sostituzione otteniamo un'equazione di secondo grado del tipo
        \[
          ax^2+bx+c=0.
        \]
        Il discriminante è
        \[
          \Delta=b^2-4ac.
        \]
        Se \(\Delta&gt;0\) ci sono due intersezioni reali distinte e la retta è secante; se \(\Delta=0\) c'è un'intersezione doppia e la retta è tangente; se \(\Delta&lt;0\) non ci sono intersezioni reali e la retta è esterna.
      </p>

      <h4>Studio di una retta generica \(y=k\)</h4>
      <p>Sostituiamo \(y=k\) nella circonferenza:</p>
      \[
        x^2+k^2=25.
      \]
      <p>Portando tutto al primo membro:</p>
      \[
        x^2+(k^2-25)=0.
      \]
      <p>Questa è un'equazione di secondo grado in \(x\), con</p>
      \[
        a=1,\qquad b=0,\qquad c=k^2-25.
      \]
      <p>Quindi</p>
      \[
        \Delta=b^2-4ac=0^2-4\cdot 1\cdot (k^2-25)=100-4k^2.
      \]

      <h4>Retta \(r_1:y=3\)</h4>
      <p>Per \(k=3\):</p>
      \[
        \Delta_1=100-4\cdot 3^2=100-36=64&gt;0.
      \]
      <p>Dunque \(r_1\) è <strong>secante</strong>. Troviamo i punti:</p>
      \[
        x^2+3^2=25 \Rightarrow x^2=16 \Rightarrow x=\pm 4.
      \]
      <p>I punti di intersezione sono \((-4,3)\) e \((4,3)\).</p>

      <h4>Retta \(r_2:y=5\)</h4>
      <p>Per \(k=5\):</p>
      \[
        \Delta_2=100-4\cdot 5^2=100-100=0.
      \]
      <p>Dunque \(r_2\) è <strong>tangente</strong>. Infatti:</p>
      \[
        x^2+5^2=25 \Rightarrow x^2=0 \Rightarrow x=0.
      \]
      <p>Il punto di tangenza è \((0,5)\).</p>

      <h4>Retta \(r_3:y=7\)</h4>
      <p>Per \(k=7\):</p>
      \[
        \Delta_3=100-4\cdot 7^2=100-196=-96&lt;0.
      \]
      <p>Dunque \(r_3\) è <strong>esterna</strong>: il sistema non ha soluzioni reali.</p>
    </section>

    <section class="exercise-result">
      <h3>Risultato finale</h3>
      <ul>
        <li>\(r_1:y=3\): \(\Delta=64&gt;0\), quindi è <strong>secante</strong>; intersezioni \((-4,3)\), \((4,3)\).</li>
        <li>\(r_2:y=5\): \(\Delta=0\), quindi è <strong>tangente</strong>; punto \((0,5)\).</li>
        <li>\(r_3:y=7\): \(\Delta=-96&lt;0\), quindi è <strong>esterna</strong>.</li>
      </ul>
    </section>
