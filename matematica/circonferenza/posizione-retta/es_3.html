    <section class="exercise-text">
      <h2>Esercizio 3 — Circonferenza non centrata e retta secante</h2>
      <p>
        Data la circonferenza
        \[
          \mathcal{C}:(x-3)^2+(y+1)^2=20
        \]
        e la retta
        \[
          r:2x-y-9=0,
        \]
        determina con il metodo del discriminante la posizione reciproca tra la retta e la circonferenza. Se la retta è secante, calcola anche i punti di intersezione e la lunghezza della corda.
      </p>
    </section>

    <section class="exercise-data">
      <h3>Dati</h3>
      <ul>
        <li>Circonferenza: \((x-3)^2+(y+1)^2=20\).</li>
        <li>Retta: \(2x-y-9=0\), cioè \(y=2x-9\).</li>
      </ul>
    </section>

    <section class="exercise-request">
      <h3>Richiesta</h3>
      <ol>
        <li>Costruire l'equazione risolvente tramite sostituzione.</li>
        <li>Studiare il discriminante \(\Delta\).</li>
        <li>Determinare eventuali punti di intersezione e lunghezza della corda.</li>
      </ol>
    </section>

  <template data-exercise-solution>
    <section class="exercise-solution">
      <h3>Svolgimento</h3>

      <h4>Passo 1 — Esplicitazione della retta</h4>
      <p>Dalla retta \(2x-y-9=0\) ricaviamo:</p>
      \[
        y=2x-9.
      \]

      <h4>Passo 2 — Sostituzione nella circonferenza</h4>
      <p>Sostituiamo \(y=2x-9\) in \((x-3)^2+(y+1)^2=20\):</p>
      \[
        (x-3)^2+(2x-9+1)^2=20.
      \]
      <p>Poiché \(2x-9+1=2x-8\), otteniamo:</p>
      \[
        (x-3)^2+(2x-8)^2=20.
      \]
      <p>Sviluppiamo:</p>
      \[
        x^2-6x+9+4x^2-32x+64=20.
      \]
      <p>Portando tutto al primo membro:</p>
      \[
        5x^2-38x+53=0.
      \]

      <h4>Passo 3 — Discriminante</h4>
      <p>L'equazione ha coefficienti \(a=5\), \(b=-38\), \(c=53\). Quindi:</p>
      \[
        \Delta=b^2-4ac=(-38)^2-4\cdot 5\cdot 53.
      \]
      \[
        \Delta=1444-1060=384&gt;0.
      \]
      <p>Poiché \(\Delta&gt;0\), la retta è <strong>secante</strong>.</p>

      <h4>Passo 4 — Punti di intersezione</h4>
      <p>Risolviamo l'equazione:</p>
      \[
        x=\frac{38\pm\sqrt{384}}{10}.
      \]
      <p>Dato che \(\sqrt{384}=8\sqrt{6}\), segue:</p>
      \[
        x=\frac{38\pm 8\sqrt{6}}{10}=\frac{19\pm 4\sqrt{6}}{5}.
      \]
      <p>Ora calcoliamo \(y=2x-9\):</p>
      \[
        y=2\cdot \frac{19\pm 4\sqrt{6}}{5}-9
        =\frac{38\pm 8\sqrt{6}-45}{5}
        =\frac{-7\pm 8\sqrt{6}}{5}.
      \]
      <p>I punti di intersezione sono quindi</p>
      \[
        A\left(\frac{19-4\sqrt{6}}{5},\frac{-7-8\sqrt{6}}{5}\right),
        \qquad
        B\left(\frac{19+4\sqrt{6}}{5},\frac{-7+8\sqrt{6}}{5}\right).
      \]

      <h4>Passo 5 — Lunghezza della corda</h4>
      <p>La lunghezza della corda è la distanza tra i due punti. Le differenze tra le coordinate sono:</p>
      \[
        \Delta x=\frac{8\sqrt{6}}{5},\qquad
        \Delta y=\frac{16\sqrt{6}}{5}.
      \]
      <p>Quindi:</p>
      \[
        AB=\sqrt{\left(\frac{8\sqrt{6}}{5}\right)^2+\left(\frac{16\sqrt{6}}{5}\right)^2}
        =\sqrt{\frac{384}{25}+\frac{1536}{25}}
        =\sqrt{\frac{1920}{25}}.
      \]
      \[
        AB=\frac{\sqrt{1920}}{5}=\frac{8\sqrt{30}}{5}.
      \]
    </section>

    <section class="exercise-result">
      <h3>Risultato finale</h3>
      <ul>
        <li>Equazione risolvente: \(5x^2-38x+53=0\).</li>
        <li>\(\Delta=384&gt;0\), quindi la retta è <strong>secante</strong>.</li>
        <li>Intersezioni: \(A\left(\frac{19-4\sqrt{6}}{5},\frac{-7-8\sqrt{6}}{5}\right)\), \(B\left(\frac{19+4\sqrt{6}}{5},\frac{-7+8\sqrt{6}}{5}\right)\).</li>
        <li>Lunghezza della corda: \(AB=\dfrac{8\sqrt{30}}{5}\).</li>
      </ul>
    </section>
