    <section class="exercise-text">
      <h2>Esercizio 3 - Circonferenza non centrata nell'origine</h2>
      <p>
        Data la circonferenza \(\mathcal{C}: (x-3)^2+(y+1)^2=20\) e la retta
        \(r: 2x-y-9=0\), determina la posizione reciproca di \(r\) rispetto a
        \(\mathcal{C}\). Se la retta e' secante, calcola anche la lunghezza
        della corda.
      </p>
    </section>

    <section class="exercise-data">
      <h3>Dati</h3>
      <ul>
        <li>Circonferenza: \((x-3)^2+(y+1)^2=20\)</li>
        <li>Retta: \(2x-y-9=0\), cioe' \(y=2x-9\)</li>
      </ul>
    </section>

  <template data-exercise-solution>
    <section class="exercise-solution">
      <h3>Svolgimento con il discriminante</h3>

      <h4>Passo 1 - Sostituzione della retta</h4>
      <p>Dalla retta \(2x-y-9=0\) ricaviamo:</p>
      \[
        y=2x-9.
      \]
      <p>Sostituiamo nella circonferenza:</p>
      \[
        (x-3)^2+\bigl((2x-9)+1\bigr)^2=20
      \]
      \[
        (x-3)^2+(2x-8)^2=20.
      \]

      <h4>Passo 2 - Equazione di secondo grado</h4>
      \[
        x^2-6x+9+4x^2-32x+64=20
      \]
      \[
        5x^2-38x+53=0.
      \]

      <h4>Passo 3 - Calcolo del discriminante</h4>
      \[
        \Delta=(-38)^2-4\cdot5\cdot53=1444-1060=384.
      \]
      <p>Poiche' \(\Delta&gt;0\), la retta e' <strong>secante</strong>.</p>

      <h4>Passo 4 - Punti di intersezione</h4>
      \[
        x=\frac{38\pm\sqrt{384}}{10}
         =\frac{38\pm8\sqrt6}{10}
         =\frac{19\pm4\sqrt6}{5}.
      \]
      <p>Usando \(y=2x-9\):</p>
      \[
        y=\frac{-7\pm8\sqrt6}{5}.
      \]
      <p>I punti sono quindi:</p>
      \[
        A\left(\frac{19-4\sqrt6}{5},\,\frac{-7-8\sqrt6}{5}\right),
        \qquad
        B\left(\frac{19+4\sqrt6}{5},\,\frac{-7+8\sqrt6}{5}\right).
      \]

      <h4>Passo 5 - Lunghezza della corda</h4>
      <p>La corda e' il segmento \(AB\). Calcoliamo le differenze tra le coordinate:</p>
      \[
        \Delta x=\frac{8\sqrt6}{5}, \qquad
        \Delta y=\frac{16\sqrt6}{5}.
      \]
      \[
        AB=\sqrt{\left(\frac{8\sqrt6}{5}\right)^2+
        \left(\frac{16\sqrt6}{5}\right)^2}
        =\sqrt{\frac{1920}{25}}
        =\frac{8\sqrt{30}}{5}.
      \]
    </section>

    <section class="exercise-result">
      <h3>Risultato</h3>
      <ul>
        <li>\(\Delta=384&gt;0\), quindi la retta e' <strong>secante</strong>.</li>
        <li>\(A\left(\frac{19-4\sqrt6}{5},\frac{-7-8\sqrt6}{5}\right)\)</li>
        <li>\(B\left(\frac{19+4\sqrt6}{5},\frac{-7+8\sqrt6}{5}\right)\)</li>
        <li>Lunghezza della corda: \(AB=\frac{8\sqrt{30}}{5}\).</li>
      </ul>
    </section>
