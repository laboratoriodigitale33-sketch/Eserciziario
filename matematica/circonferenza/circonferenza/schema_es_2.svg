<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" role="img" aria-labelledby="title desc">
  <title id="title">Fascio di rette y=x+k e circonferenza x²+y²=10</title>
  <desc id="desc">Schema cartesiano con la circonferenza di centro nell'origine e raggio radice di 10; sono mostrate una secante e le due rette tangenti del fascio y=x+k.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6f6258" />
    </marker>
    <style>
      .axis { stroke: #6f6258; stroke-width: 1.6; marker-end: url(#arrow); }
      .grid { stroke: #ded3c2; stroke-width: 1; }
      .circle { fill: rgba(139,58,42,0.08); stroke: #8b3a2a; stroke-width: 3; }
      .secant { stroke: #3a6a4a; stroke-width: 3; }
      .tangent { stroke: #b5622a; stroke-width: 3; }
      .external { stroke: #3a5a7a; stroke-width: 2.6; stroke-dasharray: 8 7; opacity: 0.85; }
      .radius { stroke: #8b3a2a; stroke-width: 2; stroke-dasharray: 5 5; }
      .point { fill: #1a1612; }
      .label { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 16px; fill: #1a1612; }
      .small { font-size: 13.5px; fill: #5f544d; }
      .caption { font-size: 15px; fill: #3d3530; font-weight: 600; }
    </style>
  </defs>

  <rect width="680" height="520" fill="#f5f0e8" />

  <!-- Origine O=(340,260), scala 50 px -->
  <g>
    <line class="grid" x1="70" y1="260" x2="610" y2="260" />
    <line class="grid" x1="340" y1="35" x2="340" y2="475" />
    <line class="grid" x1="90" y1="10" x2="590" y2="510" />
    <line class="grid" x1="90" y1="510" x2="590" y2="10" />
  </g>

  <line class="axis" x1="65" y1="260" x2="615" y2="260" />
  <line class="axis" x1="340" y1="480" x2="340" y2="35" />
  <text class="label" x="622" y="266">x</text>
  <text class="label" x="348" y="34">y</text>
  <text class="small" x="349" y="278">O</text>

  <circle class="circle" cx="340" cy="260" r="158.1" />
  <text class="caption" x="78" y="66">C: x² + y² = 10</text>
  <text class="small" x="396" y="344">R = √10</text>
  <line class="radius" x1="340" y1="260" x2="451.8" y2="371.8" />

  <!-- Rette y=x+k. Coordinate convertite con X=340+50x, Y=260-50y -->
  <!-- k=0: y=x -->
  <line class="secant" x1="110" y1="490" x2="570" y2="30" />
  <text class="label" x="430" y="84" fill="#3a6a4a">k = 0</text>
  <text class="small" x="430" y="102">secante</text>

  <!-- k=2sqrt5 tangent: y=x+4.472 -->
  <line class="tangent" x1="235" y1="510" x2="655" y2="90" />
  <text class="label" x="500" y="142" fill="#b5622a">k = 2√5</text>
  <text class="small" x="500" y="160">tangente</text>

  <!-- k=-2sqrt5 tangent: y=x-4.472 -->
  <line class="tangent" x1="25" y1="430" x2="445" y2="10" />
  <text class="label" x="88" y="390" fill="#b5622a">k = -2√5</text>
  <text class="small" x="88" y="408">tangente</text>

  <!-- esempi esterni -->
  <line class="external" x1="315" y1="510" x2="680" y2="145" />
  <line class="external" x1="0" y1="375" x2="365" y2="10" />
  <text class="small" x="538" y="220" fill="#3a5a7a">esterne per |k| &gt; 2√5</text>

  <!-- punti di tangenza: (-sqrt5, sqrt5) e (sqrt5, -sqrt5) -->
  <circle class="point" cx="228.2" cy="148.2" r="4" />
  <circle class="point" cx="451.8" cy="371.8" r="4" />
  <text class="small" x="122" y="143">T₁ = (-√5, √5)</text>
  <text class="small" x="462" y="392">T₂ = (√5, -√5)</text>

  <path d="M340 470 C430 470, 520 452, 588 420" fill="none" stroke="#c9a84c" stroke-width="2" />
  <text class="small" x="318" y="496">-2√5 &lt; k &lt; 2√5  →  rette secanti</text>
</svg>
