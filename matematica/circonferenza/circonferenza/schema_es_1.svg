<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 520" role="img" aria-labelledby="title desc">
  <title id="title">Circonferenza x²+y²=25 e rette orizzontali</title>
  <desc id="desc">Schema cartesiano con circonferenza di centro nell'origine e raggio 5; sono mostrate le rette y=3, y=5 e y=7.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6f6258" />
    </marker>
    <style>
      .axis { stroke: #6f6258; stroke-width: 1.6; marker-end: url(#arrow); }
      .grid { stroke: #ded3c2; stroke-width: 1; }
      .circle { fill: rgba(139,58,42,0.08); stroke: #8b3a2a; stroke-width: 3; }
      .line-sec { stroke: #3a6a4a; stroke-width: 3; }
      .line-tan { stroke: #b5622a; stroke-width: 3; }
      .line-ext { stroke: #3a5a7a; stroke-width: 3; stroke-dasharray: 8 7; }
      .point { fill: #1a1612; }
      .label { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 17px; fill: #1a1612; }
      .small { font-size: 14px; fill: #5f544d; }
      .caption { font-size: 15px; fill: #3d3530; font-weight: 600; }
    </style>
  </defs>

  <rect width="640" height="520" fill="#f5f0e8" />

  <!-- Griglia: origine O=(320,300), scala 35 px -->
  <g>
    <line class="grid" x1="75" y1="300" x2="565" y2="300" />
    <line class="grid" x1="320" y1="55" x2="320" y2="475" />
    <line class="grid" x1="145" y1="55" x2="145" y2="475" />
    <line class="grid" x1="495" y1="55" x2="495" y2="475" />
    <line class="grid" x1="75" y1="125" x2="565" y2="125" />
    <line class="grid" x1="75" y1="195" x2="565" y2="195" />
    <line class="grid" x1="75" y1="55" x2="565" y2="55" />
  </g>

  <line class="axis" x1="70" y1="300" x2="570" y2="300" />
  <line class="axis" x1="320" y1="480" x2="320" y2="50" />
  <text class="label" x="577" y="306">x</text>
  <text class="label" x="328" y="48">y</text>
  <text class="small" x="329" y="318">O</text>

  <circle class="circle" cx="320" cy="300" r="175" />
  <text class="caption" x="90" y="92">C: x² + y² = 25</text>
  <text class="small" x="365" y="396">R = 5</text>
  <line x1="320" y1="300" x2="495" y2="300" stroke="#8b3a2a" stroke-width="2" stroke-dasharray="5 5" />

  <!-- y=3, y=5, y=7 -->
  <line class="line-sec" x1="75" y1="195" x2="565" y2="195" />
  <line class="line-tan" x1="75" y1="125" x2="565" y2="125" />
  <line class="line-ext" x1="75" y1="55" x2="565" y2="55" />

  <text class="label" x="455" y="184" fill="#3a6a4a">r₁: y = 3</text>
  <text class="small" x="455" y="204">secante</text>
  <text class="label" x="455" y="114" fill="#b5622a">r₂: y = 5</text>
  <text class="small" x="455" y="134">tangente</text>
  <text class="label" x="455" y="44" fill="#3a5a7a">r₃: y = 7</text>
  <text class="small" x="455" y="64">esterna</text>

  <!-- punti di intersezione -->
  <circle class="point" cx="180" cy="195" r="4" />
  <circle class="point" cx="460" cy="195" r="4" />
  <circle class="point" cx="320" cy="125" r="4" />
  <text class="small" x="146" y="220">(-4, 3)</text>
  <text class="small" x="438" y="220">(4, 3)</text>
  <text class="small" x="330" y="118">(0, 5)</text>
</svg>
