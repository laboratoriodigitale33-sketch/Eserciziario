<svg xmlns="http://www.w3.org/2000/svg" viewBox="-80 -90 160 170" width="360" height="340">
  <defs>
    <marker id="ax" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#7a6f65"/>
    </marker>
  </defs>

  <!-- sfondo -->
  <rect x="-80" y="-90" width="160" height="170" fill="#ede5d5" rx="4"/>

  <!-- griglia leggera -->
  <line x1="-75" y1="-30" x2="75" y2="-30" stroke="#c8b89a" stroke-width="0.4" stroke-dasharray="2,3"/>
  <line x1="-75" y1="-50" x2="75" y2="-50" stroke="#c8b89a" stroke-width="0.4" stroke-dasharray="2,3"/>
  <line x1="-75" y1="-70" x2="75" y2="-70" stroke="#c8b89a" stroke-width="0.4" stroke-dasharray="2,3"/>
  <line x1="-75" y1="0"   x2="75" y2="0"   stroke="#c8b89a" stroke-width="0.4" stroke-dasharray="2,3"/>
  <line x1="-75" y1="30"  x2="75" y2="30"  stroke="#c8b89a" stroke-width="0.4" stroke-dasharray="2,3"/>
  <line x1="-75" y1="50"  x2="75" y2="50"  stroke="#c8b89a" stroke-width="0.4" stroke-dasharray="2,3"/>
  <line x1="0"   y1="-85" x2="0"  y2="75"  stroke="#c8b89a" stroke-width="0.4" stroke-dasharray="2,3"/>
  <line x1="-50" y1="-85" x2="-50" y2="75" stroke="#c8b89a" stroke-width="0.4" stroke-dasharray="2,3"/>
  <line x1="50"  y1="-85" x2="50"  y2="75" stroke="#c8b89a" stroke-width="0.4" stroke-dasharray="2,3"/>

  <!-- assi coordinati (scala: 1 unità = 10 px) -->
  <line x1="-75" y1="0" x2="75" y2="0" stroke="#7a6f65" stroke-width="1" marker-end="url(#ax)"/>
  <line x1="0" y1="75" x2="0" y2="-85" stroke="#7a6f65" stroke-width="1" marker-end="url(#ax)"/>
  <text x="72" y="-3" font-family="IBM Plex Mono" font-size="8" fill="#7a6f65">x</text>
  <text x="3"  y="-80" font-family="IBM Plex Mono" font-size="8" fill="#7a6f65">y</text>

  <!-- tacche e numeri -->
  <text x="-52" y="8" font-family="IBM Plex Mono" font-size="7" fill="#7a6f65" text-anchor="middle">−5</text>
  <text x="50"  y="8" font-family="IBM Plex Mono" font-size="7" fill="#7a6f65" text-anchor="middle">5</text>
  <text x="3"   y="-47" font-family="IBM Plex Mono" font-size="7" fill="#7a6f65">5</text>
  <text x="3"   y="13"  font-family="IBM Plex Mono" font-size="7" fill="#7a6f65">−1</text>
  <text x="3"   y="-27" font-family="IBM Plex Mono" font-size="7" fill="#7a6f65">3</text>
  <text x="3"   y="-67" font-family="IBM Plex Mono" font-size="7" fill="#7a6f65">7</text>

  <!-- circonferenza x²+y²=25, r=5 → 50px -->
  <circle cx="0" cy="0" r="50" fill="none" stroke="#1a1612" stroke-width="2"/>

  <!-- r3: y=7 → y=-70px, ESTERNA -->
  <line x1="-75" y1="-70" x2="75" y2="-70" stroke="#8b3a2a" stroke-width="1.8" stroke-dasharray="6,3"/>
  <text x="52" y="-73" font-family="IBM Plex Mono" font-size="9" fill="#8b3a2a">y=7</text>
  <text x="52" y="-63" font-family="IBM Plex Mono" font-size="7" fill="#8b3a2a">esterna</text>

  <!-- r2: y=5 → y=-50px, TANGENTE -->
  <line x1="-75" y1="-50" x2="75" y2="-50" stroke="#c9a84c" stroke-width="2"/>
  <text x="52" y="-53" font-family="IBM Plex Mono" font-size="9" fill="#b5882a">y=5</text>
  <text x="52" y="-43" font-family="IBM Plex Mono" font-size="7" fill="#b5882a">tangente</text>
  <!-- punto di tangenza (0,5) → (0,-50) -->
  <circle cx="0" cy="-50" r="3" fill="#c9a84c" stroke="#1a1612" stroke-width="1"/>

  <!-- r1: y=3 → y=-30px, SECANTE -->
  <line x1="-75" y1="-30" x2="75" y2="-30" stroke="#3a6a4a" stroke-width="2"/>
  <text x="52" y="-33" font-family="IBM Plex Mono" font-size="9" fill="#3a6a4a">y=3</text>
  <text x="52" y="-23" font-family="IBM Plex Mono" font-size="7" fill="#3a6a4a">secante</text>
  <!-- punti di intersezione (±4,3) → (±40,-30) -->
  <circle cx="-40" cy="-30" r="3" fill="#3a6a4a" stroke="#1a1612" stroke-width="1"/>
  <circle cx="40"  cy="-30" r="3" fill="#3a6a4a" stroke="#1a1612" stroke-width="1"/>

  <!-- centro -->
  <circle cx="0" cy="0" r="2.5" fill="#1a1612"/>
  <text x="3" y="-3" font-family="IBM Plex Mono" font-size="7" fill="#1a1612">C</text>
</svg>
