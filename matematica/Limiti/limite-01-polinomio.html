<body>
<template data-exercise-statement>
  <p>Calcola il seguente limite:</p>
  \[
    \lim_{x \to 2} (3x^2 - 5x + 1)
  \]
  <p><strong>Richiesta:</strong> stabilire se basta la sostituzione diretta.</p>
</template>

<template data-exercise-solution>
  <p>La funzione è un polinomio, quindi è continua per ogni valore reale di \(x\).</p>
  \[
    \lim_{x \to 2} (3x^2 - 5x + 1)
    = 3 \cdot 2^2 - 5 \cdot 2 + 1
    = 12 - 10 + 1 = 3
  \]
  <p><strong>Risultato:</strong> \(3\).</p>
</template>
