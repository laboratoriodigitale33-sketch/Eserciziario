<body>
<template data-exercise-statement>
  <p>Calcola il seguente limite:</p>
  \[
    \lim_{x \to 3} \frac{x^2 - 9}{x - 3}
  \]
  <p><strong>Richiesta:</strong> riconoscere la forma indeterminata e semplificare.</p>
</template>

<template data-exercise-solution>
  <p>Sostituendo \(x = 3\) si ottiene \(0/0\), quindi bisogna trasformare l'espressione.</p>
  \[
    x^2 - 9 = (x - 3)(x + 3)
  \]
  \[
    \frac{x^2 - 9}{x - 3}
    = \frac{(x - 3)(x + 3)}{x - 3}
    = x + 3
  \]
  \[
    \lim_{x \to 3} (x + 3) = 6
  \]
  <p><strong>Risultato:</strong> \(6\).</p>
</template>
