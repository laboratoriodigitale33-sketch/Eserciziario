<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Esercizi svolti | Laboratorio Digitale</title>

  <style>
    :root {
      --bg: #f6f4ef;
      --panel: #ffffff;
      --panel-soft: rgba(255, 255, 255, 0.84);
      --text: #1f2933;
      --muted: #667085;
      --muted-soft: #8a94a3;
      --border: #d8d3c7;
      --border-soft: rgba(216, 211, 199, 0.72);
      --accent: #365f85;
      --accent-dark: #24415d;
      --accent-soft: rgba(54, 95, 133, 0.12);
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.075);
      --shadow-soft: 0 12px 28px rgba(0, 0, 0, 0.045);
      --radius-xl: 30px;
      --radius-lg: 24px;
      --radius-md: 16px;
      --sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--sans);
      color: var(--text);
      background:
        radial-gradient(circle at 8% 4%, rgba(54, 95, 133, 0.14), transparent 24rem),
        radial-gradient(circle at 92% 10%, rgba(181, 141, 72, 0.09), transparent 22rem),
        linear-gradient(180deg, #f8f6f0 0%, var(--bg) 100%);
    }

    a { color: inherit; }

    .site-shell {
      width: min(1180px, calc(100% - 2rem));
      margin: 0 auto;
    }

    header {
      padding: 4.4rem 0 2.7rem;
      text-align: center;
    }

    .top-row {
      display: none;
    }

    .brand {
      display: none;
    }

    .hero {
      max-width: 880px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 auto;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(3.1rem, 7vw, 6rem);
      line-height: 0.96;
      letter-spacing: -0.055em;
      max-width: 850px;
      font-weight: 500;
      color: var(--text);
    }

    h1::after {
      content: "";
      display: block;
      width: min(180px, 38vw);
      height: 2px;
      margin: 1.05rem auto 0;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.45;
    }

    main { padding-bottom: 4rem; }

    .subject-home {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1.15rem;
      min-height: min(460px, 58vh);
      margin-top: 0.5rem;
    }

    .home-card {
      --subject-color: var(--accent);
      min-height: 380px;
      padding: clamp(1.35rem, 3vw, 2.4rem);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      background:
        linear-gradient(145deg, rgba(255,255,255,0.92), rgba(255,255,255,0.66)),
        radial-gradient(circle at 0% 0%, color-mix(in srgb, var(--subject-color) 20%, transparent), transparent 22rem);
      box-shadow: var(--shadow);
      cursor: pointer;
      text-align: left;
      color: var(--text);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      position: relative;
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
    }

    .home-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 7px;
      background: var(--subject-color);
      opacity: 0.7;
    }

    .home-card::after {
      content: "";
      position: absolute;
      width: 13rem;
      height: 13rem;
      right: -5rem;
      top: -5rem;
      border-radius: 50%;
      background: color-mix(in srgb, var(--subject-color) 14%, transparent);
      pointer-events: none;
    }

    .home-card:hover {
      transform: translateY(-4px);
      border-color: color-mix(in srgb, var(--subject-color) 42%, var(--border));
      box-shadow: 0 22px 52px rgba(0,0,0,0.095);
    }

    .home-card:focus-visible {
      outline: 4px solid color-mix(in srgb, var(--subject-color) 25%, transparent);
      outline-offset: 4px;
    }

    .home-card-kicker {
      color: color-mix(in srgb, var(--subject-color) 68%, black);
      font-weight: 800;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 1rem;
    }

    .home-card h2 {
      margin: 0;
      font-size: clamp(2.35rem, 5vw, 4.7rem);
      line-height: 0.96;
      letter-spacing: -0.06em;
      font-weight: 800;
    }

    .home-card p {
      max-width: 34rem;
      margin: 1.2rem 0 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 1rem;
    }

    .home-card-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 1rem;
      margin-top: 2rem;
      color: var(--muted);
      font-weight: 720;
    }

    .home-card-open {
      display: inline-flex;
      align-items: center;
      color: var(--accent-dark);
      font-size: 1rem;
    }

    .home-card-open::after {
      content: "→";
      margin-left: 0.45rem;
      transition: transform 160ms ease;
    }

    .home-card:hover .home-card-open::after {
      transform: translateX(4px);
    }

    .home-card-count {
      color: var(--muted-soft);
      font-size: 0.9rem;
    }

    .workspace {
      display: none;
    }

    .workspace.active {
      display: block;
    }

    .workspace-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .workspace-title {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.35rem);
      line-height: 1;
      letter-spacing: -0.055em;
      font-weight: 800;
    }

    .back-button {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--accent-dark);
      border-radius: 999px;
      padding: 0.62rem 0.92rem;
      font-weight: 760;
      cursor: pointer;
      white-space: nowrap;
    }

    .back-button:hover {
      border-color: var(--accent);
    }

    .controls {
      position: sticky;
      top: 0.75rem;
      z-index: 20;
      display: grid;
      grid-template-columns: 1.7fr repeat(2, minmax(130px, 0.55fr));
      gap: 0.8rem;
      margin: 1.2rem 0 1.1rem;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    input,
    select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.86rem 0.95rem;
      font-size: 0.95rem;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .utility-row {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.7rem;
      margin: 1rem 0 1.35rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .reset-button,
    .expand-button {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--accent-dark);
      border-radius: 999px;
      padding: 0.55rem 0.85rem;
      font-weight: 700;
      cursor: pointer;
    }

    .reset-button:hover,
    .expand-button:hover {
      border-color: var(--accent);
    }

    .results {
      display: grid;
      gap: 0.95rem;
    }

    .category-block {
      --cat-color: var(--accent);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.82);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }

    .category-block:hover {
      border-color: color-mix(in srgb, var(--cat-color) 35%, var(--border));
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.06);
    }

    .category-toggle {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      padding: 1.08rem 1.2rem;
      border: 0;
      background: transparent;
      color: var(--text);
      text-align: left;
      cursor: pointer;
    }

    .category-toggle:hover {
      background: rgba(255, 255, 255, 0.42);
    }

    .category-toggle:focus-visible {
      outline: 3px solid color-mix(in srgb, var(--cat-color) 24%, transparent);
      outline-offset: -3px;
    }

    .category-left {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      min-width: 0;
    }

    .category-dot {
      width: 0.7rem;
      height: 0.7rem;
      border-radius: 50%;
      flex: 0 0 auto;
      background: var(--cat-color);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--cat-color) 14%, transparent);
      opacity: 0.9;
    }

    .category-title {
      margin: 0;
      font-size: 1.2rem;
      line-height: 1.2;
      letter-spacing: -0.025em;
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }

    .category-desc {
      margin: 0.35rem 0 0;
      color: var(--muted);
      line-height: 1.5;
      max-width: 820px;
      font-size: 0.9rem;
    }

    .category-right {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      flex: 0 0 auto;
    }

    .category-count {
      color: var(--muted);
      border: 1px solid var(--border-soft);
      background: rgba(255, 255, 255, 0.66);
      border-radius: 999px;
      padding: 0.32rem 0.65rem;
      font-size: 0.78rem;
      font-weight: 720;
      white-space: nowrap;
    }

    .category-chevron {
      color: var(--muted);
      font-size: 0.9rem;
      transition: transform 180ms ease;
    }

    .category-toggle[aria-expanded="true"] .category-chevron {
      transform: rotate(180deg);
    }

    .category-content {
      border-top: 1px solid var(--border-soft);
      padding: 1rem;
      background: rgba(255, 255, 255, 0.5);
    }

    .category-content[hidden] {
      display: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(285px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      padding: 1.15rem;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.04);
      min-height: 265px;
      display: flex;
      flex-direction: column;
      gap: 0.78rem;
      text-decoration: none;
      color: inherit;
      position: relative;
      overflow: hidden;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      background: var(--cat-color);
      opacity: 0.55;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--cat-color) 42%, var(--border));
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.072);
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.42rem;
      padding-left: 0.15rem;
    }

    .pill {
      font-size: 0.75rem;
      padding: 0.28rem 0.52rem;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-dark);
      font-weight: 760;
    }

    .pill.category-pill {
      background: color-mix(in srgb, var(--cat-color) 15%, white);
      color: color-mix(in srgb, var(--cat-color) 68%, black);
    }

    .pill.secondary {
      background: #f3efe5;
      color: #785d27;
    }

    .card-header {
      display: flex;
      gap: 0.65rem;
      align-items: flex-start;
      padding-left: 0.15rem;
    }

    .exercise-icon {
      flex: 0 0 auto;
      display: inline-flex;
      width: 2.05rem;
      height: 2.05rem;
      align-items: center;
      justify-content: center;
      border-radius: 0.75rem;
      background: #f7f4ed;
      border: 1px solid var(--border);
      font-size: 1.05rem;
    }

    .card h3 {
      margin: 0;
      font-size: 1.12rem;
      line-height: 1.28;
      letter-spacing: -0.025em;
    }

    .description {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      flex: 1;
      padding-left: 0.15rem;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.34rem;
      padding-left: 0.15rem;
    }

    .tag {
      font-size: 0.73rem;
      color: var(--muted);
      border: 1px solid var(--border-soft);
      border-radius: 999px;
      padding: 0.22rem 0.5rem;
      background: #fff;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-top: 0.2rem;
      padding-left: 0.15rem;
    }

    .open-label {
      display: inline-flex;
      align-items: center;
      color: var(--accent-dark);
      font-weight: 820;
      font-size: 0.9rem;
    }

    .open-label::after {
      content: "→";
      margin-left: 0.35rem;
      transition: transform 160ms ease;
    }

    .card:hover .open-label::after {
      transform: translateX(3px);
    }

    .duration {
      color: var(--muted-soft);
      font-size: 0.82rem;
      white-space: nowrap;
    }

    .empty,
    .error {
      background: #fff;
      border: 1px dashed var(--border);
      border-radius: var(--radius-lg);
      padding: 2.2rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    .error strong { color: var(--text); }

    footer {
      width: min(1180px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 0 0 2rem;
      color: rgba(31, 41, 51, 0.58);
      text-align: right;
      font-style: italic;
      font-size: 0.95rem;
    }

    footer a {
      color: inherit;
      text-decoration: none;
    }

    footer a:hover { color: var(--accent); }

    @media (max-width: 900px) {
      .subject-home {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .home-card {
        min-height: 300px;
      }

      .controls {
        position: static;
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 700px) {
      header { padding-top: 2.4rem; }

      h1 { font-size: clamp(2.75rem, 13vw, 4.4rem); }

      .workspace-head {
        flex-direction: column;
        align-items: flex-start;
      }

      .utility-row {
        justify-content: flex-start;
        flex-wrap: wrap;
      }

      .category-toggle {
        align-items: flex-start;
      }

      .category-right {
        flex-direction: column;
        align-items: flex-end;
      }

      .grid { grid-template-columns: 1fr; }

      footer { text-align: left; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>

<body>
  <header class="site-shell">
    <section class="hero">
      <h1>Esercizi svolti</h1>
    </section>
  </header>

  <main class="site-shell">
    <section id="subjectHome" class="subject-home" aria-label="Scegli una materia">
      <div class="empty">Caricamento catalogo...</div>
    </section>

    <section id="workspace" class="workspace" aria-label="Archivio della materia selezionata">
      <div class="workspace-head">
        <h2 id="workspaceTitle" class="workspace-title">Materia</h2>
        <button id="backButton" class="back-button" type="button">← Torna alle materie</button>
      </div>

      <section class="controls" aria-label="Filtri esercizi">
        <input id="searchInput" type="search" placeholder="Cerca per titolo, argomento, tag, formula..." />

        <select id="topicFilter">
          <option value="">Tutti gli argomenti</option>
        </select>

        <select id="levelFilter">
          <option value="">Tutti i livelli</option>
        </select>
      </section>

      <div class="utility-row">
        <button id="expandAllButton" class="expand-button" type="button">Apri tutto</button>
        <button id="resetButton" class="reset-button" type="button">Azzera filtri</button>
      </div>

      <section id="results" class="results" aria-label="Categorie esercizi">
        <div class="empty">Seleziona una materia.</div>
      </section>
    </section>
  </main>

  <footer>
    <a href="https://github.com/laboratoriodigitale33-sketch/Eserciziario" target="_blank" rel="noopener noreferrer">
      Roberto Curcio Rubertini
    </a>
  </footer>

  <script>
    const CATALOG_FILE = "esercizi.json";

    const DEFAULT_SUBJECTS = [
      {
        name: "Fisica",
        order: 1,
        color: "#5bd4c4",
        description: "Esercizi di fisica organizzati per ambito."
      },
      {
        name: "Matematica",
        order: 2,
        color: "#8ab4f0",
        description: "Esercizi di matematica organizzati per argomento."
      }
    ];

    const state = {
      subjects: [],
      subjectByName: new Map(),
      categories: [],
      categoryByKey: new Map(),
      exercises: [],
      filtered: [],
      activeSubject: "",
      expandedCategoryKey: null,
      forceExpandAll: false
    };

    const subjectHome = document.getElementById("subjectHome");
    const workspace = document.getElementById("workspace");
    const workspaceTitle = document.getElementById("workspaceTitle");
    const backButton = document.getElementById("backButton");
    const searchInput = document.getElementById("searchInput");
    const topicFilter = document.getElementById("topicFilter");
    const levelFilter = document.getElementById("levelFilter");
    const resetButton = document.getElementById("resetButton");
    const expandAllButton = document.getElementById("expandAllButton");
    const results = document.getElementById("results");

    async function loadExercises() {
      try {
        const response = await fetch(CATALOG_FILE, { cache: "no-store" });

        if (!response.ok) {
          throw new Error(`Impossibile caricare ${CATALOG_FILE}`);
        }

        const rawData = await response.json();
        const catalog = normalizeCatalog(rawData);

        state.subjects = normalizeSubjects(catalog.subjects);
        state.subjectByName = new Map(
          state.subjects.map(subject => [normalize(subject.name), subject])
        );

        state.categories = normalizeCategories(catalog.categories);
        state.categoryByKey = new Map(
          state.categories.map(category => [categoryKey(category.subject, category.name), category])
        );

        state.exercises = catalog.exercises.map(normalizeExercise).filter(Boolean);
        ensureSubjectsFromExercises();
        ensureCategoriesFromExercises();
        sortExercises();
        renderSubjectHome();

        const hashSubject = decodeURIComponent(location.hash.replace("#", "")).trim();
        if (hashSubject && state.subjectByName.has(normalize(hashSubject))) {
          openSubject(hashSubject, { preserveHash: true });
        }
      } catch (error) {
        subjectHome.innerHTML = `
          <div class="error">
            <strong>Non è stato possibile caricare il catalogo degli esercizi.</strong><br>
            Controlla che <code>${CATALOG_FILE}</code> sia nella stessa cartella di <code>index.html</code>
            e che il file JSON sia valido.<br><br>
            Nota: se apri il file direttamente con <code>file://</code>, alcuni browser bloccano
            <code>fetch()</code>. Per testare in locale usa <code>python -m http.server</code>.
          </div>
        `;
        console.error(error);
      }
    }

    function normalizeCatalog(rawData) {
      if (Array.isArray(rawData)) {
        return {
          subjects: DEFAULT_SUBJECTS,
          categories: [],
          exercises: rawData
        };
      }

      if (!rawData || typeof rawData !== "object") {
        throw new Error("Il catalogo deve essere un array oppure un oggetto JSON.");
      }

      return {
        subjects: Array.isArray(rawData.subjects) ? rawData.subjects : DEFAULT_SUBJECTS,
        categories: Array.isArray(rawData.categories) ? rawData.categories : [],
        exercises: Array.isArray(rawData.exercises)
          ? rawData.exercises
          : Array.isArray(rawData.simulations)
            ? rawData.simulations
            : []
      };
    }

    function normalizeSubjects(subjects) {
      const byName = new Map();

      [...DEFAULT_SUBJECTS, ...subjects].forEach((subject, index) => {
        if (!subject || typeof subject !== "object") return;
        const name = String(subject.name || "").trim();
        if (!name) return;

        byName.set(normalize(name), {
          name,
          description: String(subject.description || "").trim(),
          color: String(subject.color || "#365f85").trim(),
          order: Number.isFinite(Number(subject.order)) ? Number(subject.order) : 100000 + index
        });
      });

      return [...byName.values()].sort((a, b) => a.order - b.order || a.name.localeCompare(b.name, "it"));
    }

    function normalizeCategories(categories) {
      return categories
        .filter(category => category && typeof category === "object" && category.name)
        .map((category, index) => ({
          name: String(category.name || "").trim(),
          subject: String(category.subject || inferSubjectFromCategory(category.name) || "Fisica").trim(),
          description: String(category.description || "").trim(),
          color: String(category.color || "#365f85").trim(),
          icon: String(category.icon || "").trim(),
          order: Number.isFinite(Number(category.order)) ? Number(category.order) : 100000 + index
        }))
        .sort((a, b) => a.order - b.order || a.name.localeCompare(b.name, "it"));
    }

    function normalizeExercise(exercise) {
      if (!exercise || typeof exercise !== "object") return null;

      const file = String(exercise.file || exercise.path || "").trim();
      const inferred = inferFromPath(file);

      return {
        ...exercise,
        title: String(exercise.title || "Esercizio senza titolo").trim(),
        description: String(exercise.description || "Nessuna descrizione disponibile.").trim(),
        subject: String(exercise.subject || inferred.subject || "Fisica").trim(),
        category: String(exercise.category || inferred.category || "Senza categoria").trim(),
        topic: String(exercise.topic || inferred.topic || "").trim(),
        icon: String(exercise.icon || "📄").trim(),
        order: Number.isFinite(Number(exercise.order)) ? Number(exercise.order) : 999999,
        tags: Array.isArray(exercise.tags) ? exercise.tags.map(tag => String(tag).trim()).filter(Boolean) : [],
        level: String(exercise.level || "").trim(),
        schoolYear: String(exercise.schoolYear || "").trim(),
        estimatedTime: String(exercise.estimatedTime || "").trim(),
        file
      };
    }

    function ensureSubjectsFromExercises() {
      const existing = new Set(state.subjects.map(subject => normalize(subject.name)));

      state.exercises.forEach(exercise => {
        const key = normalize(exercise.subject);
        if (!key || existing.has(key)) return;

        const subject = {
          name: exercise.subject,
          description: "",
          color: "#365f85",
          order: 999999
        };

        state.subjects.push(subject);
        state.subjectByName.set(key, subject);
        existing.add(key);
      });

      state.subjects.sort((a, b) => a.order - b.order || a.name.localeCompare(b.name, "it"));
    }

    function ensureCategoriesFromExercises() {
      const existing = new Set(state.categories.map(category => categoryKey(category.subject, category.name)));

      state.exercises.forEach(exercise => {
        const key = categoryKey(exercise.subject, exercise.category);
        if (existing.has(key)) return;

        const subject = state.subjectByName.get(normalize(exercise.subject));
        const category = {
          name: exercise.category || "Senza categoria",
          subject: exercise.subject || "Fisica",
          description: "",
          color: subject?.color || "#365f85",
          icon: "",
          order: 999999
        };

        state.categories.push(category);
        state.categoryByKey.set(key, category);
        existing.add(key);
      });
    }

    function sortExercises() {
      state.exercises.sort((a, b) => {
        const subjectA = state.subjectByName.get(normalize(a.subject))?.order ?? 999999;
        const subjectB = state.subjectByName.get(normalize(b.subject))?.order ?? 999999;
        const categoryA = state.categoryByKey.get(categoryKey(a.subject, a.category))?.order ?? 999999;
        const categoryB = state.categoryByKey.get(categoryKey(b.subject, b.category))?.order ?? 999999;

        return (
          subjectA - subjectB ||
          categoryA - categoryB ||
          String(a.topic || "").localeCompare(String(b.topic || ""), "it") ||
          a.order - b.order ||
          String(a.title || "").localeCompare(String(b.title || ""), "it")
        );
      });
    }

    function renderSubjectHome() {
      subjectHome.innerHTML = state.subjects.map(subject => {
        const exercises = state.exercises.filter(exercise => normalize(exercise.subject) === normalize(subject.name));
        const color = subject.color || "#365f85";

        return `
          <button class="home-card" type="button"
                  data-subject="${escapeAttribute(subject.name)}"
                  style="--subject-color: ${escapeAttribute(color)}"
                  aria-label="Apri ${escapeAttribute(subject.name)}">
            <div>
              <div class="home-card-kicker">Materia</div>
              <h2>${escapeHtml(subject.name)}</h2>
              ${subject.description ? `<p>${escapeHtml(subject.description)}</p>` : ""}
            </div>
            <div class="home-card-bottom">
              <span class="home-card-open">Apri sezione</span>
              <span class="home-card-count">${escapeHtml(exerciseCountLabel(exercises.length))}</span>
            </div>
          </button>
        `;
      }).join("");

      subjectHome.querySelectorAll(".home-card").forEach(card => {
        card.addEventListener("click", () => {
          openSubject(card.dataset.subject || "");
        });
      });
    }

    function openSubject(subjectName, options = {}) {
      const subject = state.subjectByName.get(normalize(subjectName));
      if (!subject) return;

      state.activeSubject = subject.name;
      state.expandedCategoryKey = null;
      state.forceExpandAll = false;

      searchInput.value = "";
      topicFilter.value = "";
      levelFilter.value = "";

      workspaceTitle.textContent = subject.name;
      subjectHome.style.display = "none";
      workspace.classList.add("active");

      populateFiltersForActiveSubject();
      applyFilters();

      if (!options.preserveHash) {
        history.replaceState(null, "", `#${encodeURIComponent(subject.name)}`);
      }
    }

    function closeSubject() {
      state.activeSubject = "";
      state.filtered = [];
      state.expandedCategoryKey = null;
      state.forceExpandAll = false;

      searchInput.value = "";
      topicFilter.value = "";
      levelFilter.value = "";

      workspace.classList.remove("active");
      subjectHome.style.display = "grid";
      results.innerHTML = `<div class="empty">Seleziona una materia.</div>`;

      history.replaceState(null, "", location.pathname + location.search);
    }

    function populateFiltersForActiveSubject() {
      const subjectExercises = getActiveSubjectExercises();
      fillSelect(topicFilter, uniqueValues(subjectExercises, "topic"));

      const rawLevels = uniqueValues(subjectExercises, "level");
      fillSelect(levelFilter, rawLevels.map(levelLabel));
      [...levelFilter.options].forEach((option, index) => {
        if (index === 0) return;
        option.value = rawLevels[index - 1];
      });
    }

    function uniqueValues(items, key) {
      return [...new Set(
        items
          .map(item => item[key])
          .filter(Boolean)
          .map(value => String(value).trim())
      )].sort((a, b) => a.localeCompare(b, "it"));
    }

    function fillSelect(select, values) {
      const first = select.querySelector("option");
      select.innerHTML = "";
      select.appendChild(first);

      values.forEach(value => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }

    function applyFilters() {
      if (!state.activeSubject) return;

      const query = normalize(searchInput.value);
      const topic = topicFilter.value;
      const level = levelFilter.value;

      state.filtered = getActiveSubjectExercises().filter(exercise => {
        const searchableText = normalize([
          exercise.title,
          exercise.subject,
          exercise.category,
          exercise.topic,
          exercise.level,
          exercise.schoolYear,
          exercise.description,
          exercise.formulas,
          ...(exercise.tags || [])
        ].join(" "));

        return (
          (!query || searchableText.includes(query)) &&
          (!topic || exercise.topic === topic) &&
          (!level || exercise.level === level)
        );
      });

      renderResults();
    }

    function getActiveSubjectExercises() {
      return state.exercises.filter(exercise => normalize(exercise.subject) === normalize(state.activeSubject));
    }

    function hasActiveFilters() {
      return Boolean(
        normalize(searchInput.value) ||
        normalize(topicFilter.value) ||
        normalize(levelFilter.value)
      );
    }

    function renderResults() {
      if (state.filtered.length === 0) {
        results.innerHTML = `
          <div class="empty">
            Nessun esercizio corrisponde ai filtri selezionati oppure questa materia non contiene ancora esercizi.
          </div>
        `;
        updateExpandButtonLabel();
        return;
      }

      const grouped = groupByCategory(state.filtered);
      const autoExpand = hasActiveFilters() || state.forceExpandAll;

      results.innerHTML = grouped.map(categoryGroup => {
        const category = categoryGroup.category;
        const exercises = categoryGroup.exercises;
        const key = categoryKey(state.activeSubject, category.name);
        const isExpanded = autoExpand || state.expandedCategoryKey === key;
        const color = category.color || state.subjectByName.get(normalize(state.activeSubject))?.color || "#365f85";

        return `
          <section class="category-block" style="--cat-color: ${escapeAttribute(color)}">
            <button class="category-toggle" type="button"
                    data-category="${escapeAttribute(category.name)}"
                    aria-expanded="${isExpanded ? "true" : "false"}">
              <div class="category-left">
                <div class="category-dot" aria-hidden="true"></div>
                <div>
                  <h2 class="category-title">
                    ${category.icon ? `<span aria-hidden="true">${escapeHtml(category.icon)}</span>` : ""}
                    ${escapeHtml(category.name)}
                  </h2>
                  ${category.description ? `<p class="category-desc">${escapeHtml(category.description)}</p>` : ""}
                </div>
              </div>
              <div class="category-right">
                <span class="category-count">${escapeHtml(exerciseCountLabel(exercises.length))}</span>
                <span class="category-chevron" aria-hidden="true">▾</span>
              </div>
            </button>

            <div class="category-content" ${isExpanded ? "" : "hidden"}>
              <div class="grid">
                ${exercises.map(exercise => renderExerciseCard(exercise, color)).join("")}
              </div>
            </div>
          </section>
        `;
      }).join("");

      updateExpandButtonLabel();
    }

    function groupByCategory(exercises) {
      const grouped = new Map();

      for (const exercise of exercises) {
        const key = categoryKey(exercise.subject, exercise.category);

        if (!grouped.has(key)) {
          const category = state.categoryByKey.get(key) || {
            name: exercise.category || "Senza categoria",
            subject: exercise.subject,
            description: "",
            color: state.subjectByName.get(normalize(exercise.subject))?.color || "#365f85",
            icon: "",
            order: 999999
          };

          grouped.set(key, {
            category,
            exercises: []
          });
        }

        grouped.get(key).exercises.push(exercise);
      }

      return [...grouped.values()]
        .map(categoryGroup => ({
          ...categoryGroup,
          exercises: categoryGroup.exercises.sort((a, b) => {
            return (
              String(a.topic || "").localeCompare(String(b.topic || ""), "it") ||
              a.order - b.order ||
              String(a.title || "").localeCompare(String(b.title || ""), "it")
            );
          })
        }))
        .sort((a, b) => {
          return (
            a.category.order - b.category.order ||
            a.category.name.localeCompare(b.category.name, "it")
          );
        });
    }

    function renderExerciseCard(exercise, color) {
      const tags = (exercise.tags || [])
        .slice(0, 7)
        .map(tag => `<span class="tag">#${escapeHtml(tag)}</span>`)
        .join("");

      const target = exercise.file || exercise.path || "#";

      return `
        <a class="card" href="${escapeAttribute(target)}" style="--cat-color: ${escapeAttribute(color)}"
           aria-label="Apri esercizio: ${escapeAttribute(exercise.title)}">
          <div class="meta">
            ${exercise.category ? `<span class="pill category-pill">${escapeHtml(exercise.category)}</span>` : ""}
            ${exercise.topic ? `<span class="pill secondary">${escapeHtml(exercise.topic)}</span>` : ""}
            ${exercise.level ? `<span class="pill secondary">${escapeHtml(levelLabel(exercise.level))}</span>` : ""}
          </div>

          <div class="card-header">
            ${exercise.icon ? `<span class="exercise-icon" aria-hidden="true">${escapeHtml(exercise.icon)}</span>` : ""}
            <h3>${escapeHtml(exercise.title || "Esercizio senza titolo")}</h3>
          </div>

          <p class="description">
            ${escapeHtml(exercise.description || "Nessuna descrizione disponibile.")}
          </p>

          <div class="tags">${tags}</div>

          <div class="card-footer">
            <span class="open-label">Apri esercizio</span>
            ${exercise.estimatedTime ? `<span class="duration">${escapeHtml(exercise.estimatedTime)}</span>` : ""}
          </div>
        </a>
      `;
    }

    function toggleCategory(toggle) {
      if (!toggle || hasActiveFilters() || state.forceExpandAll) return;

      const block = toggle.closest(".category-block");
      const content = block?.querySelector(".category-content");
      if (!block || !content) return;

      const isExpanded = toggle.getAttribute("aria-expanded") === "true";

      results.querySelectorAll(".category-toggle[aria-expanded='true']").forEach(button => {
        if (button === toggle) return;
        button.setAttribute("aria-expanded", "false");
        const otherContent = button.closest(".category-block")?.querySelector(".category-content");
        if (otherContent) otherContent.hidden = true;
      });

      const nextExpanded = !isExpanded;
      toggle.setAttribute("aria-expanded", nextExpanded ? "true" : "false");
      content.hidden = !nextExpanded;

      state.expandedCategoryKey = nextExpanded
        ? categoryKey(state.activeSubject, toggle.dataset.category || "")
        : null;
    }

    function resetFilters() {
      searchInput.value = "";
      topicFilter.value = "";
      levelFilter.value = "";
      state.expandedCategoryKey = null;
      state.forceExpandAll = false;
      applyFilters();
    }

    function toggleExpandAll() {
      state.forceExpandAll = !state.forceExpandAll;
      if (state.forceExpandAll) {
        state.expandedCategoryKey = null;
      }
      renderResults();
    }

    function updateExpandButtonLabel() {
      expandAllButton.textContent = state.forceExpandAll ? "Chiudi tutto" : "Apri tutto";
    }

    function exerciseCountLabel(count) {
      return count === 1 ? "1 esercizio" : `${count} esercizi`;
    }

    function levelLabel(value) {
      const n = normalize(value);
      if (n === "base") return "Base";
      if (n === "intermedio") return "Intermedio";
      if (n === "avanzato") return "Avanzato";
      return value || "";
    }

    function categoryKey(subject, category) {
      return `${normalize(subject)}::${normalize(category)}`;
    }

    function inferFromPath(filePath) {
      const parts = String(filePath || "").split("/").filter(Boolean);
      return {
        subject: titleCaseFromSlug(parts[0] || ""),
        category: titleCaseFromSlug(parts[1] || ""),
        topic: titleCaseFromSlug(parts[2] || "")
      };
    }

    function inferSubjectFromCategory(categoryName) {
      const name = normalize(categoryName);
      const mathNames = [
        "algebra",
        "geometria analitica",
        "analisi",
        "trigonometria",
        "probabilita e statistica",
        "probabilità e statistica"
      ];
      return mathNames.includes(name) ? "Matematica" : "Fisica";
    }

    function titleCaseFromSlug(value) {
      return String(value || "")
        .replace(/[-_]+/g, " ")
        .replace(/\b\w/g, character => character.toUpperCase());
    }

    function normalize(value) {
      return String(value || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttribute(value) {
      return escapeHtml(value).replaceAll("`", "&#096;");
    }

    searchInput.addEventListener("input", applyFilters);
    topicFilter.addEventListener("change", applyFilters);
    levelFilter.addEventListener("change", applyFilters);
    resetButton.addEventListener("click", resetFilters);
    expandAllButton.addEventListener("click", toggleExpandAll);
    backButton.addEventListener("click", closeSubject);

    results.addEventListener("click", event => {
      const categoryToggle = event.target.closest(".category-toggle");
      if (categoryToggle) {
        toggleCategory(categoryToggle);
      }
    });

    window.addEventListener("hashchange", () => {
      const hashSubject = decodeURIComponent(location.hash.replace("#", "")).trim();
      if (!hashSubject) {
        closeSubject();
      } else if (state.subjectByName.has(normalize(hashSubject))) {
        openSubject(hashSubject, { preserveHash: true });
      }
    });

    loadExercises();
  </script>
</body>
</html>
