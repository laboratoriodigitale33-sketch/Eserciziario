<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Esercizi svolti | Laboratorio Digitale</title>

  <style>
    :root {
      --bg: #f6f4ef;
      --panel: #ffffff;
      --panel-soft: rgba(255, 255, 255, 0.84);
      --panel-warm: #fbfaf6;
      --text: #1f2933;
      --muted: #667085;
      --muted-soft: #8a94a3;
      --border: #d8d3c7;
      --border-soft: rgba(216, 211, 199, 0.72);
      --accent: #365f85;
      --accent-dark: #24415d;
      --accent-soft: rgba(54, 95, 133, 0.12);
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.075);
      --shadow-soft: 0 12px 28px rgba(0, 0, 0, 0.045);
      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--sans);
      color: var(--text);
      background:
        radial-gradient(circle at 8% 4%, rgba(54, 95, 133, 0.14), transparent 24rem),
        radial-gradient(circle at 92% 10%, rgba(181, 141, 72, 0.09), transparent 22rem),
        linear-gradient(180deg, #f8f6f0 0%, var(--bg) 100%);
    }

    a {
      color: inherit;
    }

    .site-shell {
      width: min(1180px, calc(100% - 2rem));
      margin: 0 auto;
    }

    header {
      padding: 4rem 0 2.25rem;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 2.8rem;
    }

    .brand {
      color: var(--accent);
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .hero {
      max-width: 880px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.8rem, 6vw, 5.3rem);
      line-height: 0.96;
      letter-spacing: -0.065em;
      max-width: 850px;
      font-weight: 780;
    }

    main {
      padding-bottom: 4rem;
    }

    .controls {
      position: sticky;
      top: 0.75rem;
      z-index: 20;
      display: grid;
      grid-template-columns: 1.7fr repeat(3, minmax(130px, 0.55fr));
      gap: 0.8rem;
      margin: 1.2rem 0 1.1rem;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    input,
    select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.86rem 0.95rem;
      font-size: 0.95rem;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .utility-row {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.7rem;
      margin: 1rem 0 1.35rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .reset-button,
    .expand-button {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--accent-dark);
      border-radius: 999px;
      padding: 0.55rem 0.85rem;
      font-weight: 700;
      cursor: pointer;
    }

    .reset-button:hover,
    .expand-button:hover {
      border-color: var(--accent);
    }

    .results {
      display: grid;
      gap: 1rem;
    }

    .category-block {
      --cat-color: var(--accent);
      background: var(--panel-soft);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    .category-block:hover {
      border-color: color-mix(in srgb, var(--cat-color) 38%, var(--border));
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.065);
    }

    .category-toggle {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      padding: 1.1rem 1.25rem;
      border: 0;
      background: transparent;
      color: var(--text);
      text-align: left;
      cursor: pointer;
    }

    .category-toggle:hover {
      background: rgba(255, 255, 255, 0.42);
    }

    .category-toggle:focus-visible {
      outline: 3px solid color-mix(in srgb, var(--cat-color) 24%, transparent);
      outline-offset: -3px;
    }

    .category-left {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      min-width: 0;
    }

    .category-dot {
      width: 0.72rem;
      height: 0.72rem;
      border-radius: 50%;
      flex: 0 0 auto;
      background: var(--cat-color);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--cat-color) 16%, transparent);
      opacity: 0.88;
    }

    .category-text {
      min-width: 0;
    }

    .category-title {
      margin: 0;
      font-size: 1.22rem;
      line-height: 1.2;
      letter-spacing: -0.025em;
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }

    .category-icon {
      color: var(--cat-color);
      opacity: 0.8;
    }

    .category-desc {
      margin: 0.35rem 0 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.9rem;
      max-width: 780px;
    }

    .category-right {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      flex: 0 0 auto;
    }

    .category-count {
      color: var(--muted);
      border: 1px solid var(--border-soft);
      background: rgba(255, 255, 255, 0.62);
      border-radius: 999px;
      padding: 0.32rem 0.65rem;
      font-size: 0.78rem;
      font-weight: 720;
      white-space: nowrap;
    }

    .category-chevron {
      color: var(--muted);
      font-size: 0.9rem;
      transition: transform 180ms ease;
    }

    .category-toggle[aria-expanded="true"] .category-chevron {
      transform: rotate(180deg);
    }

    .category-content {
      border-top: 1px solid var(--border-soft);
      padding: 1rem;
      background: rgba(255, 255, 255, 0.48);
    }

    .category-content[hidden] {
      display: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(285px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      padding: 1.15rem;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.04);
      min-height: 265px;
      display: flex;
      flex-direction: column;
      gap: 0.78rem;
      text-decoration: none;
      color: inherit;
      position: relative;
      overflow: hidden;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      background: var(--cat-color);
      opacity: 0.55;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--cat-color) 42%, var(--border));
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.072);
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.42rem;
      padding-left: 0.15rem;
    }

    .pill {
      font-size: 0.75rem;
      padding: 0.28rem 0.52rem;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-dark);
      font-weight: 760;
    }

    .pill.category-pill {
      background: color-mix(in srgb, var(--cat-color) 15%, white);
      color: color-mix(in srgb, var(--cat-color) 68%, black);
    }

    .pill.secondary {
      background: #f3efe5;
      color: #785d27;
    }

    .card-header {
      display: flex;
      gap: 0.65rem;
      align-items: flex-start;
      padding-left: 0.15rem;
    }

    .exercise-icon {
      flex: 0 0 auto;
      display: inline-flex;
      width: 2.05rem;
      height: 2.05rem;
      align-items: center;
      justify-content: center;
      border-radius: 0.75rem;
      background: #f7f4ed;
      border: 1px solid var(--border);
      font-size: 1.05rem;
    }

    .card h3 {
      margin: 0;
      font-size: 1.12rem;
      line-height: 1.28;
      letter-spacing: -0.025em;
    }

    .description {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      flex: 1;
      padding-left: 0.15rem;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.34rem;
      padding-left: 0.15rem;
    }

    .tag {
      font-size: 0.73rem;
      color: var(--muted);
      border: 1px solid var(--border-soft);
      border-radius: 999px;
      padding: 0.22rem 0.5rem;
      background: #fff;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-top: 0.2rem;
      padding-left: 0.15rem;
    }

    .open-label {
      display: inline-flex;
      align-items: center;
      color: var(--accent-dark);
      font-weight: 820;
      font-size: 0.9rem;
    }

    .open-label::after {
      content: "→";
      margin-left: 0.35rem;
      transition: transform 160ms ease;
    }

    .card:hover .open-label::after {
      transform: translateX(3px);
    }

    .duration {
      color: var(--muted-soft);
      font-size: 0.82rem;
      white-space: nowrap;
    }

    .empty,
    .error {
      background: #fff;
      border: 1px dashed var(--border);
      border-radius: var(--radius-lg);
      padding: 2.2rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    .error strong {
      color: var(--text);
    }

    footer {
      width: min(1180px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 0 0 2rem;
      color: rgba(31, 41, 51, 0.58);
      text-align: right;
      font-style: italic;
      font-size: 0.95rem;
    }

    footer a {
      color: inherit;
      text-decoration: none;
    }

    footer a:hover {
      color: var(--accent);
    }

    @media (max-width: 900px) {
      .controls {
        position: static;
        grid-template-columns: 1fr 1fr;
      }

      .controls input {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 700px) {
      header {
        padding-top: 2.4rem;
      }

      .top-row {
        margin-bottom: 2.2rem;
      }

      h1 {
        font-size: clamp(2.55rem, 12vw, 4rem);
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .utility-row {
        justify-content: flex-start;
        flex-wrap: wrap;
      }

      .category-toggle {
        align-items: flex-start;
      }

      .category-right {
        flex-direction: column;
        align-items: flex-end;
      }

      .category-desc {
        max-width: none;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      footer {
        text-align: left;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>

<body>
  <header class="site-shell">
    <div class="top-row">
      <div class="brand">Esercizi svolti</div>
    </div>

    <section class="hero">
      <h1>Esercizi svolti</h1>
    </section>
  </header>

  <main class="site-shell">
    <section class="controls" aria-label="Filtri esercizi">
      <input id="searchInput" type="search" placeholder="Cerca per titolo, argomento, tag, formula..." />

      <select id="categoryFilter">
        <option value="">Tutte le categorie</option>
      </select>

      <select id="topicFilter">
        <option value="">Tutti gli argomenti</option>
      </select>

      <select id="levelFilter">
        <option value="">Tutti i livelli</option>
      </select>
    </section>

    <div class="utility-row">
      <button id="expandAllButton" class="expand-button" type="button">Apri tutto</button>
      <button id="resetButton" class="reset-button" type="button">Azzera filtri</button>
    </div>

    <section id="results" class="results" aria-label="Categorie esercizi">
      <div class="empty">Caricamento catalogo...</div>
    </section>
  </main>

  <footer>
    <a href="https://github.com/laboratoriodigitale33-sketch/Eserciziario" target="_blank" rel="noopener noreferrer">
      Roberto Curcio Rubertini
    </a>
  </footer>

  <script>
    const CATALOG_FILE = "esercizi.json";

    const state = {
      categories: [],
      categoryByName: new Map(),
      exercises: [],
      filtered: [],
      expandedCategoryKey: null,
      forceExpandAll: false
    };

    const searchInput = document.getElementById("searchInput");
    const categoryFilter = document.getElementById("categoryFilter");
    const topicFilter = document.getElementById("topicFilter");
    const levelFilter = document.getElementById("levelFilter");
    const resetButton = document.getElementById("resetButton");
    const expandAllButton = document.getElementById("expandAllButton");
    const results = document.getElementById("results");

    async function loadExercises() {
      try {
        const response = await fetch(CATALOG_FILE, { cache: "no-store" });

        if (!response.ok) {
          throw new Error(`Impossibile caricare ${CATALOG_FILE}`);
        }

        const rawData = await response.json();
        const catalog = normalizeCatalog(rawData);

        state.categories = normalizeCategories(catalog.categories);
        state.categoryByName = new Map(
          state.categories
            .filter(category => category && category.name)
            .map(category => [normalize(category.name), category])
        );

        state.exercises = catalog.exercises.map(normalizeExercise).filter(Boolean);
        sortExercises();
        populateFilters();
        applyFilters();
      } catch (error) {
        results.innerHTML = `
          <div class="error">
            <strong>Non è stato possibile caricare il catalogo degli esercizi.</strong><br>
            Controlla che <code>${CATALOG_FILE}</code> sia nella stessa cartella di <code>index.html</code>
            e che il file JSON sia valido.<br><br>
            Nota: se apri il file direttamente con <code>file://</code>, alcuni browser bloccano
            <code>fetch()</code>. Per testare in locale usa <code>python -m http.server</code>.
          </div>
        `;
        console.error(error);
      }
    }

    function normalizeCatalog(rawData) {
      if (Array.isArray(rawData)) {
        return {
          categories: [],
          exercises: rawData
        };
      }

      if (!rawData || typeof rawData !== "object") {
        throw new Error("Il catalogo deve essere un array oppure un oggetto JSON.");
      }

      return {
        categories: Array.isArray(rawData.categories) ? rawData.categories : [],
        exercises: Array.isArray(rawData.exercises)
          ? rawData.exercises
          : Array.isArray(rawData.simulations)
            ? rawData.simulations
            : []
      };
    }

    function normalizeCategories(categories) {
      return categories
        .filter(category => category && typeof category === "object" && category.name)
        .map((category, index) => ({
          name: String(category.name || "").trim(),
          description: String(category.description || "").trim(),
          color: String(category.color || "#365f85").trim(),
          icon: String(category.icon || "").trim(),
          order: Number.isFinite(Number(category.order)) ? Number(category.order) : 100000 + index
        }))
        .sort((a, b) => a.order - b.order || a.name.localeCompare(b.name, "it"));
    }

    function normalizeExercise(exercise) {
      if (!exercise || typeof exercise !== "object") return null;

      const file = String(exercise.file || exercise.path || "").trim();

      return {
        ...exercise,
        title: String(exercise.title || "Esercizio senza titolo").trim(),
        description: String(exercise.description || "Nessuna descrizione disponibile.").trim(),
        category: String(exercise.category || inferCategoryFromPath(file) || "Senza categoria").trim(),
        topic: String(exercise.topic || "").trim(),
        subject: String(exercise.subject || "").trim(),
        icon: String(exercise.icon || "📄").trim(),
        order: Number.isFinite(Number(exercise.order)) ? Number(exercise.order) : 999999,
        tags: Array.isArray(exercise.tags) ? exercise.tags.map(tag => String(tag).trim()).filter(Boolean) : [],
        level: String(exercise.level || "").trim(),
        schoolYear: String(exercise.schoolYear || "").trim(),
        estimatedTime: String(exercise.estimatedTime || "").trim(),
        file
      };
    }

    function sortExercises() {
      const categoryOrder = new Map(
        state.categories.map((category, index) => [
          normalize(category.name),
          Number.isFinite(Number(category.order)) ? Number(category.order) : 100000 + index
        ])
      );

      state.exercises.sort((a, b) => {
        const categoryA = categoryOrder.get(normalize(a.category)) ?? 999999;
        const categoryB = categoryOrder.get(normalize(b.category)) ?? 999999;

        return (
          categoryA - categoryB ||
          String(a.topic || "").localeCompare(String(b.topic || ""), "it") ||
          a.order - b.order ||
          String(a.title || "").localeCompare(String(b.title || ""), "it")
        );
      });
    }

    function populateFilters() {
      fillSelect(categoryFilter, categoriesForFilter());
      fillSelect(topicFilter, uniqueExerciseValues("topic"));
      fillSelect(levelFilter, uniqueExerciseValues("level"));
    }

    function categoriesForFilter() {
      const exerciseCategoryNames = new Set(
        state.exercises
          .map(exercise => String(exercise.category || "").trim())
          .filter(Boolean)
      );

      if (state.categories.length > 0) {
        const fromKnownCategories = state.categories
          .map(category => category.name)
          .filter(name => exerciseCategoryNames.has(name));

        const missing = [...exerciseCategoryNames]
          .filter(name => !fromKnownCategories.includes(name))
          .sort((a, b) => a.localeCompare(b, "it"));

        return [...fromKnownCategories, ...missing];
      }

      return [...exerciseCategoryNames].sort((a, b) => a.localeCompare(b, "it"));
    }

    function uniqueExerciseValues(key) {
      return [...new Set(
        state.exercises
          .map(item => item[key])
          .filter(Boolean)
          .map(value => String(value).trim())
      )].sort((a, b) => a.localeCompare(b, "it"));
    }

    function fillSelect(select, values) {
      const first = select.querySelector("option");
      select.innerHTML = "";
      select.appendChild(first);

      values.forEach(value => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }

    function applyFilters() {
      const query = normalize(searchInput.value);
      const category = categoryFilter.value;
      const topic = topicFilter.value;
      const level = levelFilter.value;

      state.filtered = state.exercises.filter(exercise => {
        const searchableText = normalize([
          exercise.title,
          exercise.subject,
          exercise.category,
          exercise.topic,
          exercise.level,
          exercise.schoolYear,
          exercise.description,
          exercise.formulas,
          ...(exercise.tags || [])
        ].join(" "));

        return (
          (!query || searchableText.includes(query)) &&
          (!category || exercise.category === category) &&
          (!topic || exercise.topic === topic) &&
          (!level || exercise.level === level)
        );
      });

      renderResults();
    }

    function hasActiveFilters() {
      return Boolean(
        normalize(searchInput.value) ||
        normalize(categoryFilter.value) ||
        normalize(topicFilter.value) ||
        normalize(levelFilter.value)
      );
    }

    function renderResults() {
      if (state.filtered.length === 0) {
        results.innerHTML = `
          <div class="empty">
            Nessun esercizio corrisponde ai filtri selezionati.
          </div>
        `;
        return;
      }

      const grouped = groupByCategory(state.filtered);
      const autoExpand = hasActiveFilters() || state.forceExpandAll;

      const html = grouped.map((group, index) => {
        const category = group.category;
        const exercises = group.exercises;
        const key = normalize(category.name);
        const isExpanded = autoExpand || state.expandedCategoryKey === key;
        const color = category.color || "#365f85";

        return `
          <section class="category-block" style="--cat-color: ${escapeAttribute(color)}">
            <button class="category-toggle" type="button"
                    data-category="${escapeAttribute(category.name)}"
                    aria-expanded="${isExpanded ? "true" : "false"}">
              <div class="category-left">
                <div class="category-dot" aria-hidden="true"></div>
                <div class="category-text">
                  <h2 class="category-title">
                    ${category.icon ? `<span class="category-icon" aria-hidden="true">${escapeHtml(category.icon)}</span>` : ""}
                    ${escapeHtml(category.name)}
                  </h2>
                  ${category.description ? `<p class="category-desc">${escapeHtml(category.description)}</p>` : ""}
                </div>
              </div>
              <div class="category-right">
                <span class="category-count">${escapeHtml(exerciseCountLabel(exercises.length))}</span>
                <span class="category-chevron" aria-hidden="true">▾</span>
              </div>
            </button>

            <div class="category-content" ${isExpanded ? "" : "hidden"}>
              <div class="grid">
                ${exercises.map(exercise => renderExerciseCard(exercise, color)).join("")}
              </div>
            </div>
          </section>
        `;
      }).join("");

      results.innerHTML = html;
      updateExpandButtonLabel();
    }

    function groupByCategory(exercises) {
      const groupedMap = new Map();

      for (const exercise of exercises) {
        const key = normalize(exercise.category || "Senza categoria");

        if (!groupedMap.has(key)) {
          const known = state.categoryByName.get(key);
          groupedMap.set(key, {
            category: known || {
              name: exercise.category || "Senza categoria",
              description: "",
              color: "#365f85",
              icon: "",
              order: 999999
            },
            exercises: []
          });
        }

        groupedMap.get(key).exercises.push(exercise);
      }

      return [...groupedMap.values()]
        .map(group => ({
          ...group,
          exercises: group.exercises.sort((a, b) => {
            return (
              String(a.topic || "").localeCompare(String(b.topic || ""), "it") ||
              a.order - b.order ||
              String(a.title || "").localeCompare(String(b.title || ""), "it")
            );
          })
        }))
        .sort((a, b) => {
          return (
            a.category.order - b.category.order ||
            a.category.name.localeCompare(b.category.name, "it")
          );
        });
    }

    function renderExerciseCard(exercise, color) {
      const tags = (exercise.tags || [])
        .slice(0, 7)
        .map(tag => `<span class="tag">#${escapeHtml(tag)}</span>`)
        .join("");

      const target = exercise.file || exercise.path || "#";

      return `
        <a class="card" href="${escapeAttribute(target)}" style="--cat-color: ${escapeAttribute(color)}"
           aria-label="Apri esercizio: ${escapeAttribute(exercise.title)}">
          <div class="meta">
            ${exercise.subject ? `<span class="pill">${escapeHtml(exercise.subject)}</span>` : ""}
            ${exercise.category ? `<span class="pill category-pill">${escapeHtml(exercise.category)}</span>` : ""}
            ${exercise.topic ? `<span class="pill secondary">${escapeHtml(exercise.topic)}</span>` : ""}
            ${exercise.level ? `<span class="pill secondary">${escapeHtml(levelLabel(exercise.level))}</span>` : ""}
          </div>

          <div class="card-header">
            ${exercise.icon ? `<span class="exercise-icon" aria-hidden="true">${escapeHtml(exercise.icon)}</span>` : ""}
            <h3>${escapeHtml(exercise.title || "Esercizio senza titolo")}</h3>
          </div>

          <p class="description">
            ${escapeHtml(exercise.description || "Nessuna descrizione disponibile.")}
          </p>

          <div class="tags">${tags}</div>

          <div class="card-footer">
            <span class="open-label">Apri esercizio</span>
            ${exercise.estimatedTime ? `<span class="duration">${escapeHtml(exercise.estimatedTime)}</span>` : ""}
          </div>
        </a>
      `;
    }

    function toggleCategory(toggle) {
      if (!toggle || hasActiveFilters() || state.forceExpandAll) return;

      const block = toggle.closest(".category-block");
      const content = block?.querySelector(".category-content");
      if (!block || !content) return;

      const isExpanded = toggle.getAttribute("aria-expanded") === "true";

      results.querySelectorAll(".category-toggle[aria-expanded='true']").forEach(button => {
        if (button === toggle) return;
        button.setAttribute("aria-expanded", "false");
        const otherContent = button.closest(".category-block")?.querySelector(".category-content");
        if (otherContent) otherContent.hidden = true;
      });

      const nextExpanded = !isExpanded;
      toggle.setAttribute("aria-expanded", nextExpanded ? "true" : "false");
      content.hidden = !nextExpanded;

      state.expandedCategoryKey = nextExpanded ? normalize(toggle.dataset.category || "") : null;
    }

    function resetFilters() {
      searchInput.value = "";
      categoryFilter.value = "";
      topicFilter.value = "";
      levelFilter.value = "";
      state.expandedCategoryKey = null;
      state.forceExpandAll = false;
      applyFilters();
    }

    function toggleExpandAll() {
      state.forceExpandAll = !state.forceExpandAll;
      if (state.forceExpandAll) {
        state.expandedCategoryKey = null;
      }
      renderResults();
    }

    function updateExpandButtonLabel() {
      expandAllButton.textContent = state.forceExpandAll ? "Chiudi tutto" : "Apri tutto";
    }

    function exerciseCountLabel(count) {
      return count === 1 ? "1 esercizio" : `${count} esercizi`;
    }

    function levelLabel(value) {
      const n = normalize(value);
      if (n === "base") return "Base";
      if (n === "intermedio") return "Intermedio";
      if (n === "avanzato") return "Avanzato";
      return value || "";
    }

    function inferCategoryFromPath(filePath) {
      const parts = String(filePath || "").split("/").filter(Boolean);
      if (parts.length <= 1) return "";
      return titleCaseFromSlug(parts[0]);
    }

    function titleCaseFromSlug(value) {
      return String(value || "")
        .replace(/[-_]+/g, " ")
        .replace(/\b\w/g, character => character.toUpperCase());
    }

    function normalize(value) {
      return String(value || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttribute(value) {
      return escapeHtml(value).replaceAll("`", "&#096;");
    }

    searchInput.addEventListener("input", applyFilters);
    categoryFilter.addEventListener("change", applyFilters);
    topicFilter.addEventListener("change", applyFilters);
    levelFilter.addEventListener("change", applyFilters);
    resetButton.addEventListener("click", resetFilters);
    expandAllButton.addEventListener("click", toggleExpandAll);

    results.addEventListener("click", event => {
      const toggle = event.target.closest(".category-toggle");
      if (toggle) {
        toggleCategory(toggle);
      }
    });

    loadExercises();
  </script>
</body>
</html>
